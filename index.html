<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sleeper All-Time Stats</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --black: #08080d;
  --dark: #0f0f17;
  --dark2: #16161f;
  --dark3: #1d1d28;
  --dark4: #252533;
  --gold: #f0b429;
  --gold2: #ffd166;
  --gold-dim: rgba(240,180,41,0.15);
  --gold-glow: rgba(240,180,41,0.08);
  --text: #f0efe8;
  --text2: #9897a4;
  --text3: #5a5968;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.14);
  --green: #22c55e; --green-bg: rgba(34,197,94,0.1); --green-text: #86efac;
  --red: #ef4444; --red-bg: rgba(239,68,68,0.1); --red-text: #fca5a5;
  --blue-bg: rgba(59,130,246,0.1); --blue-text: #93c5fd;
  --amber-bg: rgba(245,158,11,0.12); --amber-text: #fcd34d;
  --radius: 6px; --radius-lg: 10px; --radius-xl: 16px;
  --font-display: 'Barlow Condensed', sans-serif;
  --font-body: 'Inter', sans-serif;
  --font-mono: 'DM Mono', monospace;
}

html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--black);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── HERO ── */
.hero {
  position: relative;
  width: 100%;
  height: 420px;
  overflow: hidden;
  background: var(--black);
}
.hero-svg { position: absolute; inset: 0; width: 100%; height: 100%; }
.hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(160deg, rgba(8,8,13,0.3) 0%, rgba(8,8,13,0.5) 50%, rgba(8,8,13,0.98) 100%);
}
.hero-content {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end;
  padding-bottom: 48px;
  text-align: center;
}
.hero-eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.25em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 12px;
  opacity: 0.9;
}
.hero-title {
  font-family: var(--font-display);
  font-size: clamp(72px, 14vw, 130px);
  font-weight: 900;
  font-style: italic;
  letter-spacing: -0.01em;
  color: #fff;
  line-height: 0.9;
  text-transform: uppercase;
}
.hero-title .fl { color: var(--gold); }
.hero-rule {
  width: 60px; height: 2px;
  background: var(--gold);
  margin: 16px auto;
  opacity: 0.8;
}
.hero-sub {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.2em;
  color: rgba(255,255,255,0.35);
  text-transform: uppercase;
}
.hero-scroll-hint {
  position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
  font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em;
  color: rgba(255,255,255,0.2); text-transform: uppercase;
}

/* ── LAYOUT ── */
.app {
  max-width: 1040px;
  margin: 0 auto;
  padding: 0 1.5rem 4rem;
}

/* ── NAV BAR ── */
.nav-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(8,8,13,0.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 0 0 0 1.5rem;
}
.nav-bar::after {
  content: '';
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 40px;
  background: linear-gradient(to right, transparent, rgba(8,8,13,0.95));
  pointer-events: none;
}
.nav-inner {
  max-width: 1040px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
  padding-right: 40px;
}
.nav-inner::-webkit-scrollbar { display: none; }
.nav-logo {
  font-family: var(--font-display);
  font-weight: 800;
  font-style: italic;
  font-size: 18px;
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-right: 24px;
  white-space: nowrap;
  padding: 14px 0;
}
.tab {
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.04em;
  padding: 16px 14px 14px;
  border: none;
  border-bottom: 2px solid transparent;
  background: transparent;
  color: var(--text3);
  cursor: pointer;
  white-space: nowrap;
  transition: color 0.15s, border-color 0.15s;
  text-transform: uppercase;
}
.tab:hover { color: var(--text2); }
.tab.active { color: var(--gold); border-bottom-color: var(--gold); }
.nav-spacer { flex: 1; }
.nav-change {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--text3);
  border: 1px solid var(--border2);
  background: transparent;
  padding: 5px 10px;
  border-radius: var(--radius);
  cursor: pointer;
  white-space: nowrap;
  transition: color 0.15s, border-color 0.15s;
}
.nav-change:hover { color: var(--text); border-color: var(--border2); background: var(--dark3); }

/* ── SECTION LABEL ── */
.section-label {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold);
  margin: 2.5rem 0 1rem;
  display: flex;
  align-items: center;
  gap: 12px;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(to right, var(--border2), transparent);
}

/* ── METRICS GRID ── */
.metrics {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.metric {
  background: var(--dark2);
  padding: 20px 20px 18px;
  transition: background 0.15s;
}
.metric:hover { background: var(--dark3); }
.metric-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.metric-value {
  font-family: var(--font-display);
  font-size: 32px;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
}
.metric-sub {
  font-size: 11px;
  color: var(--text3);
  margin-top: 4px;
}

/* ── CARDS ── */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.card {
  background: var(--dark2);
  padding: 1.25rem 1.5rem;
}
.card h3 {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--text);
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.card.wide { grid-column: 1 / -1; }
.card-solo {
  background: var(--dark2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.25rem 1.5rem;
  margin-bottom: 1px;
}
.card-solo h3 {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--text);
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}

/* ── LEADERBOARD ROWS ── */
.lb-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}
.lb-row:last-child { border-bottom: none; }
.rank {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text3);
  min-width: 20px;
  text-align: center;
}
.rank.gold { color: var(--gold); font-weight: 600; }
.rank.silver { color: #9ca3af; font-weight: 600; }
.av {
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 600;
  flex-shrink: 0;
  font-family: var(--font-display);
  letter-spacing: 0.02em;
}
.lname {
  font-size: 13px;
  font-weight: 500;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--text);
}
.val {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 700;
  text-align: right;
  color: var(--text);
  letter-spacing: 0.02em;
}
.val-sub {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text3);
  text-align: right;
  margin-top: 1px;
}
.champ-badge {
  font-family: var(--font-mono);
  font-size: 9px;
  padding: 2px 6px;
  border-radius: 3px;
  background: var(--gold-dim);
  color: var(--gold);
  border: 1px solid rgba(240,180,41,0.25);
  letter-spacing: 0.05em;
  margin-left: 4px;
  text-transform: uppercase;
  white-space: nowrap;
}

/* ── RECORD ROWS ── */
.record-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  gap: 12px;
}
.record-row:last-child { border-bottom: none; }
.record-label { font-size: 13px; font-weight: 500; color: var(--text); }
.record-who { font-family: var(--font-mono); font-size: 10px; color: var(--text3); margin-top: 3px; letter-spacing: 0.05em; }
.record-val {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 700;
  white-space: nowrap;
  color: var(--gold);
}

/* ── H2H TABLE ── */
.h2h-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.h2h-table { border-collapse: collapse; font-size: 12px; width: 100%; }
.h2h-table th, .h2h-table td {
  padding: 8px 12px;
  text-align: center;
  border: 1px solid var(--border);
  white-space: nowrap;
}
.h2h-table th {
  background: var(--dark3);
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--text3);
  text-transform: uppercase;
}
.h2h-table td.win {
  background: rgba(34,197,94,0.12);
  color: var(--green-text);
  font-weight: 600;
  font-family: var(--font-mono);
}
.h2h-table td.loss {
  background: rgba(239,68,68,0.08);
  color: var(--red-text);
  font-family: var(--font-mono);
}
.h2h-table td.na { color: var(--text3); background: var(--dark3); }

/* ── SEASON BARS ── */
.season-row {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 0; border-bottom: 1px solid var(--border);
}
.season-row:last-child { border-bottom: none; }
.bar-wrap { flex: 1; height: 4px; background: var(--dark4); border-radius: 2px; overflow: hidden; }
.bar-fill { height: 4px; border-radius: 2px; opacity: 0.8; }

/* ── FUN CARDS ── */
.fun-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.fun-card {
  background: var(--dark2);
  padding: 1.25rem 1.5rem;
  display: flex; flex-direction: column; gap: 7px;
  transition: background 0.15s;
}
.fun-card:hover { background: var(--dark3); }
.fun-card-wide { grid-column: 1 / -1; }
.fun-emoji { font-size: 22px; line-height: 1; margin-bottom: 2px; }
.fun-title {
  font-family: var(--font-mono);
  font-size: 9px; font-weight: 500;
  color: var(--gold); text-transform: uppercase;
  letter-spacing: 0.15em;
}
.fun-winner {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-display);
  font-size: 18px; font-weight: 700;
  color: var(--text); text-transform: uppercase;
  letter-spacing: 0.02em;
}
.fun-stat { font-family: var(--font-mono); font-size: 11px; color: var(--text2); }
.fun-flavor { font-size: 12px; color: var(--text3); line-height: 1.5; }

/* ── LOADING ── */
.loading {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 60vh;
  gap: 16px;
}
.loading-title {
  font-family: var(--font-display);
  font-size: 48px; font-weight: 900; font-style: italic;
  color: var(--gold); text-transform: uppercase;
  letter-spacing: 0.05em;
}
.loading p {
  font-family: var(--font-mono);
  font-size: 11px; letter-spacing: 0.12em;
  color: var(--text3); text-transform: uppercase;
}
.progress-outer {
  width: 240px; height: 2px;
  background: var(--dark4);
  border-radius: 1px;
}
.progress-inner {
  height: 2px; background: var(--gold);
  border-radius: 1px; transition: width 0.4s ease;
}
.spinner {
  width: 32px; height: 32px;
  border: 2px solid var(--dark4);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── BADGES ── */
.badge {
  font-family: var(--font-mono);
  font-size: 10px; font-weight: 500;
  padding: 3px 8px; border-radius: 3px;
  background: var(--blue-bg); color: var(--blue-text);
  letter-spacing: 0.06em; text-transform: uppercase;
  border: 1px solid rgba(59,130,246,0.2);
}
.badge.warn {
  background: var(--amber-bg); color: var(--amber-text);
  border-color: rgba(245,158,11,0.2);
}

/* ── ERROR / SETUP ── */
.error-box {
  background: var(--red-bg); color: var(--red-text);
  border: 1px solid rgba(239,68,68,0.2);
  padding: 1rem 1.25rem; border-radius: var(--radius-lg);
  font-size: 13px; margin-bottom: 1rem; line-height: 1.6;
}
.setup-wrap {
  min-height: 100vh; display: flex;
  align-items: center; justify-content: center;
  padding: 2rem;
  background: radial-gradient(ellipse at 60% 40%, rgba(240,180,41,0.06) 0%, transparent 60%), var(--black);
}
.setup-card {
  background: var(--dark2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-xl);
  padding: 2.5rem;
  max-width: 440px; width: 100%;
}
.setup-logo {
  font-family: var(--font-display);
  font-size: 48px; font-weight: 900; font-style: italic;
  color: var(--gold); text-transform: uppercase;
  letter-spacing: 0.05em; line-height: 1;
  margin-bottom: 8px;
}
.setup-card h2 {
  font-family: var(--font-body);
  font-size: 16px; font-weight: 600;
  color: var(--text); margin-bottom: 6px;
}
.setup-card p { font-size: 13px; color: var(--text3); margin-bottom: 1.5rem; line-height: 1.65; }
.input-row { display: flex; gap: 8px; }
input[type=text] {
  flex: 1; padding: 10px 14px;
  font-family: var(--font-mono); font-size: 13px;
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  background: var(--dark3); color: var(--text);
  outline: none; letter-spacing: 0.04em;
  transition: border-color 0.15s;
}
input[type=text]:focus { border-color: var(--gold); }
button {
  padding: 10px 18px; font-size: 13px; font-weight: 600;
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  background: var(--dark3); color: var(--text);
  cursor: pointer; transition: all 0.15s;
  font-family: var(--font-body);
}
button:hover { background: var(--dark4); border-color: var(--border2); }
button.primary {
  background: var(--gold); color: var(--black);
  border-color: var(--gold); font-weight: 700;
}
button.primary:hover { background: var(--gold2); border-color: var(--gold2); }

/* ── NOTE ── */
.note {
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: 0.06em;
  color: var(--text3); margin-bottom: 14px;
  line-height: 1.6; text-transform: uppercase;
}

/* ── FOOTER ── */
.footer {
  margin-top: 3rem; padding-top: 1.5rem;
  border-top: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: 0.1em;
  color: var(--text3); text-align: center;
  text-transform: uppercase;
}

/* ── POS CHIPS ── */
.pos-chip {
  font-family: var(--font-mono);
  font-size: 9px; font-weight: 600;
  padding: 2px 6px; border-radius: 3px;
  text-transform: uppercase; flex-shrink: 0;
  letter-spacing: 0.06em;
}

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.tab-content-inner { animation: fadeUp 0.2s ease; }

/* ── TRADE CARDS ── */
.trade-card {
  background: var(--dark2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1rem 1.25rem;
  margin-bottom: 2px;
  transition: background 0.15s;
}
.trade-card:hover { background: var(--dark3); }
.trade-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px;
}
.trade-season {
  font-family: var(--font-display);
  font-size: 15px; font-weight: 800; font-style: italic;
  color: var(--gold); letter-spacing: 0.04em;
}
.trade-week {
  font-family: var(--font-mono);
  font-size: 10px; color: var(--text3);
  letter-spacing: 0.1em; text-transform: uppercase;
}
.trade-parties {
  display: flex; align-items: flex-start;
  gap: 12px; flex-wrap: wrap;
}
.trade-party { flex: 1; min-width: 160px; }
.trade-party-name {
  font-size: 13px; font-weight: 600; color: var(--text);
  margin-bottom: 6px;
}
.trade-players { display: flex; flex-direction: column; gap: 4px; }
.trade-received { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
.trade-dir {
  font-family: var(--font-mono);
  font-size: 9px; letter-spacing: 0.1em;
  color: var(--text3); text-transform: uppercase;
  margin-right: 4px; white-space: nowrap;
}
.trade-player-chip {
  display: inline-flex; align-items: center;
  font-size: 12px; color: var(--text2);
  padding: 2px 0;
}
.trade-arrow {
  font-size: 18px; color: var(--text3);
  padding-top: 20px; flex-shrink: 0;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--dark); }
::-webkit-scrollbar-thumb { background: var(--dark4); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }

/* ── MOBILE ── */
@media (max-width: 640px) {
  .hero { height: 260px; }
  .hero-title { font-size: 64px; }
  .hero-rule { margin: 10px auto; }
  .hero-sub { font-size: 10px; letter-spacing: 0.15em; }
  .hero-eyebrow { font-size: 9px; margin-bottom: 8px; }

  .app { padding: 0 0.75rem 3rem; }

  .nav-logo { font-size: 15px; margin-right: 12px; }
  .tab { font-size: 11px; padding: 13px 10px 11px; }

  .section-label { font-size: 9px; margin-top: 1.25rem; margin-bottom: 8px; }

  .metrics { grid-template-columns: repeat(2, 1fr); gap: 1px; }
  .metric { padding: 12px; }
  .metric-value { font-size: 24px; }

  .cards { grid-template-columns: 1fr; gap: 1px; }

  /* Overview standings table — simplify columns on mobile */
  .standings-table { display: none; }
  .standings-mobile { display: block; }

  /* Leaderboard rows — shrink gaps */
  .lb-row { gap: 6px; padding: 6px 0; }
  .val { font-size: 14px; }

  /* Record rows */
  .record-val { font-size: 16px; }

  /* H2H table — allow scroll */
  .h2h-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .h2h-table th, .h2h-table td { padding: 5px 7px; font-size: 11px; }

  /* Season cards */
  .season-row { gap: 6px; }

  /* Fun grid — single column */
  .fun-grid { grid-template-columns: 1fr; }
  .fun-card-wide { grid-column: 1; }

  /* Champions grid — single column */
  .champs-grid { grid-template-columns: 1fr !important; }

  /* Card solo padding */
  .card-solo { padding: 0.875rem 1rem; }
  .card { padding: 0.875rem 1rem; }

  /* Loading */
  .loading-title { font-size: 36px; }

  /* Setup */
  .setup-card { padding: 1.5rem; }
  .setup-logo { font-size: 36px; }

  /* Lname — allow wrap on mobile instead of truncating */
  .lname { white-space: normal; overflow: visible; text-overflow: unset; font-size: 12px; }

  /* Section label no right rule on very small screens */
  .section-label::after { display: none; }
}

@media (max-width: 400px) {
  .hero { height: 220px; }
  .hero-title { font-size: 52px; }
  .metrics { grid-template-columns: 1fr 1fr; }
  .tab { font-size: 10px; padding: 12px 8px 10px; }
}
</style>
</head>

<div class="app" id="app"></div>
<script>
const API = 'https://api.sleeper.app/v1';
const COLORS = [
  ['#2d1f6e','#a78bfa'],['#0d3d2e','#6ee7b7'],['#3d1a0e','#fca5a5'],
  ['#0c2d4f','#93c5fd'],['#3d2a08','#fcd34d'],['#3d0e2a','#f9a8d4'],
  ['#1a3d0e','#86efac'],['#3d0e0e','#fca5a5'],['#1e1e2e','#c4b5fd'],
];
const app = document.getElementById('app');
let dashData = null;
let currentTab = 'overview';

function colorFor(id) {
  let h = 5381;
  for (let i = 0; i < (id||'').length; i++) h = ((h<<5)+h) ^ (id||'').charCodeAt(i);
  return COLORS[Math.abs(h) % COLORS.length];
}
function initials(name) {
  if (!name) return '?';
  const p = name.trim().split(/\s+/);
  return p.length >= 2 ? (p[0][0]+p[p.length-1][0]).toUpperCase() : name.slice(0,2).toUpperCase();
}
function av(name, id, size=28) {
  const [bg,fg] = colorFor(id||name);
  return `<div class="av" style="width:${size}px;height:${size}px;background:${bg};color:${fg};font-size:${size<30?11:13}px">${initials(name)}</div>`;
}
function render(html) { app.innerHTML = html; }
function fmt(n, d=2) { return (typeof n==='number'&&isFinite(n)) ? n.toFixed(d) : '—'; }
function fmtInt(n) { return Math.round(n).toLocaleString(); }

function showSetup(prefill='', error='') {
  render(`<div class="setup-wrap">
    <div class="setup-card">
      <div class="setup-logo">DUDFL</div>
      <h2>Load League Stats</h2>
      <p>Enter your Sleeper league ID to pull all historical data across every season.</p>
      ${error ? `<div class="error-box">${error}</div>` : ''}
      <div class="input-row">
        <input type="text" id="lid" placeholder="1313934632156147712" value="${prefill}" />
        <button class="primary" id="loadBtn">Load</button>
      </div>
      <p style="margin-top:12px;font-size:11px;color:var(--text3);font-family:var(--font-mono);letter-spacing:0.04em">Find your ID in the Sleeper URL: sleeper.com/leagues/<strong style="color:var(--gold)">ID</strong>/...</p>
    </div>
  </div>`);
  document.getElementById('loadBtn').onclick = startLoad;
  const inp = document.getElementById('lid');
  inp.focus();
  inp.onkeydown = e => { if (e.key==='Enter') startLoad(); };
}

function showLoading(msg, pct) {
  render(`<div class="loading">
    <div class="loading-title">DUDFL</div>
    <p>${msg}</p>
    ${pct!=null ? `<div class="progress-outer"><div class="progress-inner" style="width:${pct}%"></div></div>` : '<div class="spinner"></div>'}
  </div>`);
}

async function fetchJ(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function startLoad() {
  const inp = document.getElementById('lid');
  const id = (inp ? inp.value : '').trim();
  if (!id) return;
  currentTab = 'overview';
  try {
    await loadAll(id);
  } catch(e) {
    showSetup(id, `Failed to load: ${e.message}. Check the league ID and try again.`);
  }
}

async function loadAll(startId) {
  showLoading('Connecting to Sleeper...', 5);

  const leagues = [];
  let cur = startId;
  while (cur && cur !== '0') {
    const lg = await fetchJ(`${API}/league/${cur}`);
    leagues.unshift(lg);
    cur = lg.previous_league_id || null;
  }
  if (!leagues.length) throw new Error('No league found for that ID.');

  const leagueName = leagues[leagues.length-1].name || 'Fantasy League';
  const allData = [];

  for (let i = 0; i < leagues.length; i++) {
    const lg = leagues[i];
    const pct = 10 + Math.round((i/leagues.length)*70);
    showLoading(`Loading ${lg.season} (${i+1}/${leagues.length})...`, pct);

    const [users, rosters] = await Promise.all([
      fetchJ(`${API}/league/${lg.league_id}/users`),
      fetchJ(`${API}/league/${lg.league_id}/rosters`),
    ]);

    const playoffStart = lg.settings?.playoff_week_start || 15;
    const regWeeks = Math.min(playoffStart - 1, 17);

    // Fetch matchups + transactions in one parallel batch
    const [weekData, txnData] = await Promise.all([
      Promise.all(
        Array.from({length: regWeeks}, (_,i) => i+1).map(w =>
          fetchJ(`${API}/league/${lg.league_id}/matchups/${w}`)
            .then(d => ({w, d})).catch(() => ({w, d:[]}))
        )
      ),
      Promise.all(
        Array.from({length: regWeeks}, (_,i) => i+1).map(w =>
          fetchJ(`${API}/league/${lg.league_id}/transactions/${w}`)
            .then(d => d).catch(() => [])
        )
      ),
    ]);

    const matchupsByWeek = {};
    for (const {w, d} of weekData) matchupsByWeek[w] = d;
    const transactions = txnData.flat();

    let bracket = [];
    try { bracket = await fetchJ(`${API}/league/${lg.league_id}/winners_bracket`); } catch {}

    allData.push({ lg, users, rosters, matchupsByWeek, transactions, bracket });
  }

  showLoading('Loading NFL player names...', 85);
  let playerMap = {};
  try {
    const cacheKey = 'sleeper_players_v4';
    const cached = sessionStorage.getItem(cacheKey);
    if (cached) {
      playerMap = JSON.parse(cached);
    } else {
      showLoading('Loading NFL player database (one-time, ~5MB)...', 87);
      const players = await fetchJ(`${API}/players/nfl`);
      for (const [id, p] of Object.entries(players)) {
        if (p.full_name || p.first_name) {
          playerMap[id] = {
            name: p.full_name || `${p.first_name||''} ${p.last_name||''}`.trim(),
            pos: p.position || '',
            team: p.team || '',
          };
        }
      }
      try { sessionStorage.setItem(cacheKey, JSON.stringify(playerMap)); } catch {}
    }
  } catch(e) {
    console.warn('Player names unavailable, continuing without them:', e);
  }

  showLoading('Computing stats...', 95);
  await new Promise(r => setTimeout(r, 30));
  dashData = computeStats(allData, leagueName, playerMap);
  renderDashboard();
}

function computeStats(allData, leagueName, playerMap={}) {
  const userMap = {};
  const avatarMap = {};
  const ownershipHistory = {};
  const ownershipChanges = [];

  for (const {lg, users, rosters} of allData) {
    for (const u of users) {
      if (u.user_id) {
        userMap[u.user_id] = u.display_name || u.metadata?.team_name || u.username || u.user_id;
        if (u.avatar) avatarMap[u.user_id] = u.avatar;
      }
    }
    for (const r of rosters) {
      if (!r.owner_id) continue;
      if (!ownershipHistory[r.roster_id]) ownershipHistory[r.roster_id] = [];
      ownershipHistory[r.roster_id].push({season: lg.season, ownerId: r.owner_id});
    }
  }

  for (const [rosterId, hist] of Object.entries(ownershipHistory)) {
    for (let i = 1; i < hist.length; i++) {
      if (hist[i].ownerId !== hist[i-1].ownerId) {
        ownershipChanges.push({
          rosterId,
          fromSeason: hist[i-1].season, toSeason: hist[i].season,
          fromOwner: userMap[hist[i-1].ownerId] || hist[i-1].ownerId,
          toOwner: userMap[hist[i].ownerId] || hist[i].ownerId,
        });
      }
    }
  }

  const mgr = {};
  function M(oid) {
    if (!mgr[oid]) mgr[oid] = {
      ownerId: oid, name: userMap[oid] || oid,
      wins:0, losses:0, ties:0, pf:0, pa:0,
      seasons:0, championships:0, playoffApps:0,
      highScore:0, highCtx:'', lowScore:Infinity, lowCtx:'',
      weeklyScores:[], h2h:{},
    };
    return mgr[oid];
  }

  const allMatchups = [];
  const seasonSummaries = [];
  const champRosters = [];

  for (const {lg, rosters, matchupsByWeek, bracket} of allData) {
    const rto = {};
    for (const r of rosters) { if (r.owner_id) rto[r.roster_id] = r.owner_id; }
    const seasonOwners = new Set(Object.values(rto));
    for (const oid of seasonOwners) M(oid).seasons++;

    for (const [wStr, matchups] of Object.entries(matchupsByWeek)) {
      const week = parseInt(wStr);
      const grp = {};
      for (const mu of (matchups||[])) {
        if (mu.matchup_id == null) continue;
        (grp[mu.matchup_id] = grp[mu.matchup_id]||[]).push(mu);
      }
      for (const pair of Object.values(grp)) {
        if (pair.length !== 2) continue;
        const [a, b] = pair;
        const oA = rto[a.roster_id], oB = rto[b.roster_id];
        if (!oA || !oB) continue;
        const sA = a.points||0, sB = b.points||0;
        if (sA===0 && sB===0) continue;
        const mA=M(oA), mB=M(oB), ctx=`${lg.season} Wk${week}`;
        mA.pf+=sA; mA.pa+=sB; mB.pf+=sB; mB.pa+=sA;
        mA.weeklyScores.push({score:sA,season:lg.season,week});
        mB.weeklyScores.push({score:sB,season:lg.season,week});
        if (sA>mA.highScore) { mA.highScore=sA; mA.highCtx=ctx; }
        if (sB>mB.highScore) { mB.highScore=sB; mB.highCtx=ctx; }
        if (sA>0&&sA<mA.lowScore) { mA.lowScore=sA; mA.lowCtx=ctx; }
        if (sB>0&&sB<mB.lowScore) { mB.lowScore=sB; mB.lowCtx=ctx; }
        if (!mA.h2h[oB]) mA.h2h[oB]={w:0,l:0};
        if (!mB.h2h[oA]) mB.h2h[oA]={w:0,l:0};
        if (sA>sB) { mA.wins++; mB.losses++; mA.h2h[oB].w++; mB.h2h[oA].l++; }
        else if (sB>sA) { mB.wins++; mA.losses++; mB.h2h[oA].w++; mA.h2h[oB].l++; }
        else { mA.ties++; mB.ties++; }
        allMatchups.push({season:lg.season,week,oA,oB,sA,sB,nA:userMap[oA]||oA,nB:userMap[oB]||oB,diff:Math.abs(sA-sB)});
      }
    }

    if (bracket?.length) {
      const maxR = Math.max(...bracket.map(b=>b.r||0));
      const champGame = bracket.find(b=>b.r===maxR&&(b.p===1||(!b.p)));
      if (champGame?.w) { const co=rto[champGame.w]; if(co) M(co).championships++; }
      const r1rosters = new Set(bracket.filter(b=>b.r===1).flatMap(b=>[b.t1,b.t2]).filter(Boolean));
      for (const rid of r1rosters) { const oid=rto[rid]; if(oid) M(oid).playoffApps++; }

      // Store champion's roster for the Championships tab
      if (champGame?.w) {
        const champRoster = rosters.find(r => r.roster_id === champGame.w);
        const champOwnerId = rto[champGame.w];
        const hasGames = allMatchups.some(m => m.season === lg.season);
        if (champRoster && champOwnerId && hasGames) {
          // Tally each starter's total points this season from matchup data
          const starterPts = {};
          for (const weekMatchups of Object.values(matchupsByWeek)) {
            const mu = (weekMatchups||[]).find(m => m.roster_id === champGame.w);
            if (!mu?.players_points) continue;
            for (const [pid, pts] of Object.entries(mu.players_points)) {
              if (pts > 0) starterPts[pid] = (starterPts[pid]||0) + pts;
            }
          }
          champRosters.push({
            season: lg.season,
            ownerName: userMap[champOwnerId] || champOwnerId,
            ownerAvatar: avatarMap[champOwnerId] || null,
            players: champRoster.players || [],
            starters: champRoster.starters || [],
            starterPts,
          });
        }
      }
    }

    const sPF={}, sW={}, sL={};
    for (const oid of seasonOwners) { sPF[oid]=0; sW[oid]=0; sL[oid]=0; }
    for (const mu of allMatchups.filter(m=>m.season===lg.season)) {
      sPF[mu.oA]=(sPF[mu.oA]||0)+mu.sA; sPF[mu.oB]=(sPF[mu.oB]||0)+mu.sB;
      if(mu.sA>mu.sB){sW[mu.oA]=(sW[mu.oA]||0)+1;sL[mu.oB]=(sL[mu.oB]||0)+1;}
      else if(mu.sB>mu.sA){sW[mu.oB]=(sW[mu.oB]||0)+1;sL[mu.oA]=(sL[mu.oA]||0)+1;}
    }
    seasonSummaries.push({
      season: lg.season,
      managers: [...seasonOwners].map(oid=>({oid,name:userMap[oid]||oid,wins:sW[oid]||0,losses:sL[oid]||0,pf:sPF[oid]||0}))
        .sort((a,b)=>b.wins-a.wins||b.pf-a.pf),
    });
  }

  const managers = Object.values(mgr).filter(m=>m.wins+m.losses>0)
    .sort((a,b)=>(b.wins/(b.wins+b.losses||1))-(a.wins/(a.wins+a.losses||1)));

  const nonZero = allMatchups.filter(m=>m.sA>0&&m.sB>0);
  const highGame = [...allMatchups].sort((a,b)=>Math.max(b.sA,b.sB)-Math.max(a.sA,a.sB))[0];
  const lowGame = [...nonZero].sort((a,b)=>Math.min(a.sA,a.sB)-Math.min(b.sA,b.sB))[0];
  const closestGame = [...nonZero].filter(m=>m.diff>0).sort((a,b)=>a.diff-b.diff)[0];
  const blowout = [...allMatchups].sort((a,b)=>b.diff-a.diff)[0];
  const badLuck = nonZero.map(m=>{
    const loser=m.sA<m.sB?{name:m.nA,score:m.sA}:{name:m.nB,score:m.sB};
    return {...loser,season:m.season,week:m.week};
  }).sort((a,b)=>b.score-a.score)[0];

  const seasons = [...new Set(allMatchups.map(m=>m.season))].sort();
  const totalGames = allMatchups.length;
  const avgScore = allMatchups.reduce((s,m)=>s+m.sA+m.sB,0)/(totalGames*2||1);

  // --- Player stats across all seasons ---
  const playerPoints = {};
  const playerPoints2024 = {}; // last completed season only
  const tradeCounts = {};
  const waiverCuts = {};

  // Find the most recent season that has actual game data
  const seasonsWithGames = [...new Set(allMatchups.map(m=>m.season))].sort();
  const lastSeason = seasonsWithGames[seasonsWithGames.length - 1];

  for (const {lg, matchupsByWeek, rosters, transactions} of allData) {
    const rto = {};
    for (const r of rosters) { if (r.owner_id) rto[r.roster_id] = r.owner_id; }

    for (const [wStr, matchups] of Object.entries(matchupsByWeek)) {
      const week = parseInt(wStr);
      for (const mu of (matchups||[])) {
        const ownerId = rto[mu.roster_id];
        const pp = mu.players_points || {};
        for (const [pid, pts] of Object.entries(pp)) {
          if (!pts || pts <= 0) continue;
          if (!playerPoints[pid]) playerPoints[pid] = {totalPts:0, weeks:0, owners:new Set(), seasons:new Set(), bestWeek:0, bestWeekCtx:''};
          const p = playerPoints[pid];
          p.totalPts += pts;
          p.weeks++;
          if (ownerId) p.owners.add(ownerId);
          p.seasons.add(lg.season);
          if (pts > p.bestWeek) { p.bestWeek = pts; p.bestWeekCtx = `${lg.season} Wk${week}`; }

          // Also track last season separately
          if (lg.season === lastSeason) {
            if (!playerPoints2024[pid]) playerPoints2024[pid] = {totalPts:0, weeks:0, bestWeek:0, bestWeekCtx:''};
            const q = playerPoints2024[pid];
            q.totalPts += pts;
            q.weeks++;
            if (pts > q.bestWeek) { q.bestWeek = pts; q.bestWeekCtx = `${lg.season} Wk${week}`; }
          }
        }
      }
    }

    // Count trades and waiver cuts from transactions
    const seenTxn = new Set();
    for (const txn of (transactions||[])) {
      if (txn.status !== 'complete') continue;
      if (txn.transaction_id && seenTxn.has(txn.transaction_id)) continue;
      if (txn.transaction_id) seenTxn.add(txn.transaction_id);

      if (txn.type === 'trade') {
        for (const pid of Object.keys(txn.adds || {})) {
          tradeCounts[pid] = (tradeCounts[pid]||0) + 1;
        }
      } else if (txn.type === 'waiver' || txn.type === 'free_agent') {
        // drops in non-trade = cut/released
        for (const pid of Object.keys(txn.drops || {})) {
          waiverCuts[pid] = (waiverCuts[pid]||0) + 1;
        }
      }
    }
  }

  const topScorers = Object.entries(playerPoints)
    .map(([pid, s]) => ({
      pid,
      name: playerMap[pid]?.name || `Player ${pid}`,
      pos: playerMap[pid]?.pos || '',
      team: playerMap[pid]?.team || '',
      totalPts: s.totalPts,
      weeks: s.weeks,
      avgPts: s.totalPts / (s.weeks||1),
      owners: s.owners.size,
      seasons: [...s.seasons].sort(),
      bestWeek: s.bestWeek,
      bestWeekCtx: s.bestWeekCtx,
    }))
    .filter(p => p.weeks >= 2 && p.totalPts > 10)
    .sort((a,b) => b.totalPts - a.totalPts);

  const topAvgScorers = [...topScorers].filter(p=>p.weeks>=4).sort((a,b)=>b.avgPts-a.avgPts);

  const mostTraded = Object.entries(tradeCounts)
    .map(([pid, count]) => ({
      pid, count,
      name: playerMap[pid]?.name || `Player ${pid}`,
      pos: playerMap[pid]?.pos || '',
      team: playerMap[pid]?.team || '',
    }))
    .sort((a,b) => b.count - a.count)
    .slice(0, 25);

  const mostCut = Object.entries(waiverCuts)
    .map(([pid, count]) => ({
      pid, count,
      name: playerMap[pid]?.name || `Player ${pid}`,
      pos: playerMap[pid]?.pos || '',
      team: playerMap[pid]?.team || '',
    }))
    .sort((a,b) => b.count - a.count)
    .slice(0, 25);

  return {leagueName,managers,ownershipChanges,seasonSummaries,allMatchups,userMap,totalGames,avgScore,seasons,highGame,lowGame,closestGame,blowout,badLuck,topScorers,topAvgScorers,mostTraded,mostCut,playerMap,champRosters,playerPoints2024,lastSeason};
}

function renderDashboard() {
  if (!dashData) return;
  const {leagueName,seasons,ownershipChanges} = dashData;
  const tabs = ['overview','leaderboards','records','head-to-head','seasons','ownership','fun','players','champions','salaries'];
  const tabLabels = {overview:'Overview',leaderboards:'Leaderboards',records:'Records','head-to-head':'H2H',seasons:'Seasons',ownership:'Ownership',fun:'Fun',players:'Players',champions:'Champions',salaries:'Salaries'};

  // Inject sticky nav before app div (outside app)
  let nav = document.getElementById('site-nav');
  if (!nav) {
    nav = document.createElement('div');
    nav.id = 'site-nav';
    nav.className = 'nav-bar';
    document.getElementById('app').before(nav);
  }
  nav.innerHTML = `<div class="nav-inner">
    <span class="nav-logo">DUDFL</span>
    ${tabs.map(t=>`<button class="tab${t===currentTab?' active':''}" data-tab="${t}">${tabLabels[t]}</button>`).join('')}
  </div>`;

  app.innerHTML = `<div class="tab-content-inner" id="tab-content"></div>
    <div class="footer">Stats follow the person, not the franchise slot &mdash; ownership tracked via Sleeper owner_id per season</div>`;


  nav.onclick = e => {
    const t = e.target.dataset.tab;
    if (t) { currentTab = t; renderDashboard(); }
  };
  renderTab();
}

function renderTab() {
  const el = document.getElementById('tab-content');
  if (!el) return;
  const fns = {overview:tabOverview,leaderboards:tabLeaderboards,records:tabRecords,'head-to-head':tabH2H,seasons:tabSeasons,ownership:tabOwnership,fun:tabFun,players:tabPlayers,champions:tabChampions,salaries:tabSalaries};
  el.innerHTML = `<div class="tab-content-inner">${(fns[currentTab] || (() => ''))()}</div>`;
}

function lbCard(title, arr, valFn, subFn) {
  return `<div class="card">
    <h3>${title}</h3>

    <div class="lb-row">
      <span class="rank ${i===0?'gold':i===1?'silver':''}">${i===0?'①':i===1?'②':i===2?'③':i+1}</span>
      ${av(m.name,m.ownerId,30)}

      <div><div class="val">${valFn(m)}</div><div class="val-sub">${subFn(m)}</div></div>
    </div>`).join('')}
  </div>`;
}

function tabLeaderboards() {
  const {managers} = dashData;
  const byWR = [...managers].sort((a,b)=>(b.wins/(b.wins+b.losses||1))-(a.wins/(a.wins+a.losses||1)));
  const byPPG = [...managers].sort((a,b)=>(b.pf/(b.wins+b.losses||1))-(a.pf/(a.wins+a.losses||1)));
  const byPF = [...managers].sort((a,b)=>b.pf-a.pf);
  const byPA = [...managers].sort((a,b)=>b.pa-a.pa);
  const byChamp = [...managers].filter(m=>m.championships>0).sort((a,b)=>b.championships-a.championships);
  const byPlayoff = [...managers].sort((a,b)=>b.playoffApps-a.playoffApps);
  const bySD = managers.map(m=>{
    const sc=m.weeklyScores.map(s=>s.score).filter(s=>s>0);
    const mean=sc.reduce((a,b)=>a+b,0)/(sc.length||1);
    const sd=Math.sqrt(sc.reduce((a,b)=>a+(b-mean)**2,0)/(sc.length||1));
    return {...m,sd};
  }).sort((a,b)=>a.sd-b.sd);
  return `
    <div class="section-label">Performance</div>
    <div class="cards">
      ${lbCard('Win rate',byWR,m=>`${((m.wins/(m.wins+m.losses||1))*100).toFixed(1)}%`,m=>`${m.wins}W &ndash; ${m.losses}L`)}
      ${lbCard('Points per game',byPPG,m=>fmt(m.pf/(m.wins+m.losses||1),1),m=>`${fmtInt(m.pf)} total pts`)}
      ${lbCard('Total points for',byPF,m=>fmtInt(m.pf),m=>`${m.wins+m.losses} games`)}
      ${lbCard('Total points against',byPA,m=>fmtInt(m.pa),m=>`avg ${fmt(m.pa/(m.wins+m.losses||1),1)}/gm`)}
    </div>
    <div class="section-label">Consistency &amp; hardware</div>
    <div class="cards">
      ${lbCard('Most consistent',bySD,m=>`${fmt(m.sd,1)} SD`,m=>`avg ${fmt(m.pf/(m.wins+m.losses||1),1)} PPG`)}
      ${byChamp.length?lbCard('Championships',byChamp,m=>`${m.championships} title${m.championships!==1?'s':''}`,m=>`${m.playoffApps} playoff app${m.playoffApps!==1?'s':''}`):''}
      ${lbCard('Playoff appearances',byPlayoff,m=>`${m.playoffApps}`,m=>`${((m.playoffApps/(m.seasons||1))*100).toFixed(0)}% of seasons`)}
    </div>`;
}

function tabRecords() {
  const {managers,highGame,lowGame,closestGame,blowout,badLuck,allMatchups,userMap} = dashData;
  const sznPF={};
  for (const mu of allMatchups) {
    const kA=`${mu.oA}__${mu.season}`,kB=`${mu.oB}__${mu.season}`;
    sznPF[kA]=(sznPF[kA]||0)+mu.sA; sznPF[kB]=(sznPF[kB]||0)+mu.sB;
  }
  const sznArr=Object.entries(sznPF).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  const bestSzn=sznArr[0], worstSzn=sznArr[sznArr.length-1];
  function sznLabel(k){const[oid,s]=k.split('__');return `${userMap[oid]||oid} &mdash; ${s}`;}
  function row(label,who,val,gold=false){
    return `<div class="record-row">
      <div><div class="record-label">${label}</div><div class="record-who">${who}</div></div>
      <div class="record-val" style="${gold?'color:var(--gold)':''}">${val}</div>
    </div>`;
  }
  const byHigh=[...managers].sort((a,b)=>b.highScore-a.highScore);
  const byLow=[...managers].filter(m=>m.lowScore<Infinity).sort((a,b)=>a.lowScore-b.lowScore);
  return `
    <div class="section-label">All-time game records</div>
    <div class="card-solo">
      ${highGame?row('Highest single score',`${highGame.sA>highGame.sB?highGame.nA:highGame.nB} &mdash; ${highGame.season} Wk${highGame.week}`,fmt(Math.max(highGame.sA,highGame.sB)),true):''}
      ${lowGame?row('Lowest single score',`${lowGame.sA<lowGame.sB?lowGame.nA:lowGame.nB} &mdash; ${lowGame.season} Wk${lowGame.week}`,fmt(Math.min(lowGame.sA,lowGame.sB))):''}
      ${closestGame?row('Closest win ever',`${closestGame.nA} vs ${closestGame.nB} &mdash; ${closestGame.season} Wk${closestGame.week}`,`+${fmt(closestGame.diff)}`):''}
      ${blowout?row('Biggest blowout',`${blowout.sA>blowout.sB?blowout.nA:blowout.nB} def. ${blowout.sA>blowout.sB?blowout.nB:blowout.nA} &mdash; ${blowout.season} Wk${blowout.week}`,`+${fmt(blowout.diff)}`,true):''}
      ${badLuck?row('Most pts scored in a loss',`${badLuck.name} &mdash; ${badLuck.season} Wk${badLuck.week}`,fmt(badLuck.score)):''}
      ${bestSzn?row('Highest scoring season',sznLabel(bestSzn[0]),fmtInt(bestSzn[1])+' pts',true):''}
      ${worstSzn?row('Lowest scoring season',sznLabel(worstSzn[0]),fmtInt(worstSzn[1])+' pts'):''}
    </div>
    <div class="section-label">Personal bests</div>
    <div class="cards">
      ${lbCard('Highest single-week score',byHigh,m=>fmt(m.highScore),m=>m.highCtx)}
      ${lbCard('Lowest single-week score',byLow,m=>fmt(m.lowScore),m=>m.lowCtx)}
    </div>`;
}

function tabH2H() {

    if(mA.ownerId===mB.ownerId) return `<td class="na">&mdash;</td>`;

}

function tabFun() {
  const {managers,allMatchups,seasons,totalGames,avgScore} = dashData;
  const nonZero = allMatchups.filter(m=>m.sA>0&&m.sB>0);

  // --- Heartbreak award: most losses by < 5 pts ---
  const heartbreakCounts = {};
  for (const mu of nonZero) {
    if (mu.diff < 5 && mu.diff > 0) {
      const loser = mu.sA < mu.sB ? mu.oA : mu.oB;
      heartbreakCounts[loser] = (heartbreakCounts[loser]||0)+1;
    }
  }
  const heartbreakKing = managers.map(m=>({...m,hb:heartbreakCounts[m.ownerId]||0})).sort((a,b)=>b.hb-a.hb)[0];

  // --- Robbery victim: most wins by < 5 pts (lucky wins) ---
  const luckyWinCounts = {};
  for (const mu of nonZero) {
    if (mu.diff < 5 && mu.diff > 0) {
      const winner = mu.sA > mu.sB ? mu.oA : mu.oB;
      luckyWinCounts[winner] = (luckyWinCounts[winner]||0)+1;
    }
  }
  const luckyCharm = managers.map(m=>({...m,lw:luckyWinCounts[m.ownerId]||0})).sort((a,b)=>b.lw-a.lw)[0];

  // --- Glass cannon: highest avg score but worst win rate ---
  const glassCannon = managers.map(m=>{
    const g=m.wins+m.losses||1;
    const ppg=m.pf/g, wr=m.wins/g;
    return {...m,ppg,wr,score:ppg - wr*200};
  }).sort((a,b)=>b.score-a.score)[0];

  // --- Bully: best record vs bottom half of league ---
  // find bottom half by win rate
  const sorted = [...managers].sort((a,b)=>(a.wins/(a.wins+a.losses||1))-(b.wins/(b.wins+b.losses||1)));
  const bottomHalf = new Set(sorted.slice(0, Math.floor(sorted.length/2)).map(m=>m.ownerId));
  const bullyStats = managers.map(m=>{
    let w=0,l=0;
    for (const mu of nonZero) {
      if (mu.oA===m.ownerId && bottomHalf.has(mu.oB)) { mu.sA>mu.sB?w++:l++; }
      if (mu.oB===m.ownerId && bottomHalf.has(mu.oA)) { mu.sB>mu.sA?w++:l++; }
    }
    return {...m,bw:w,bl:l,bwr:w/(w+l||1)};
  }).filter(m=>m.bw+m.bl>3).sort((a,b)=>b.bwr-a.bwr)[0];

  // --- Rivalry: most games played between two specific people ---
  const rivalCounts = {};
  for (const mu of allMatchups) {
    const key = [mu.oA,mu.oB].sort().join('|');
    if (!rivalCounts[key]) rivalCounts[key]={count:0,oA:mu.oA,oB:mu.oB,wA:0,wB:0};
    rivalCounts[key].count++;
    if (mu.sA>mu.sB) rivalCounts[key].wA++; else if (mu.sB>mu.sA) rivalCounts[key].wB++;
  }
  const topRival = Object.values(rivalCounts).sort((a,b)=>b.count-a.count)[0];

  // --- Groundhog: manager whose score varies least week to week (most boring) ---
  const boringAward = managers.map(m=>{
    const sc=m.weeklyScores.map(s=>s.score).filter(s=>s>0);
    const mean=sc.reduce((a,b)=>a+b,0)/(sc.length||1);
    const sd=Math.sqrt(sc.reduce((a,b)=>a+(b-mean)**2,0)/(sc.length||1));
    return {...m,sd,mean};
  }).filter(m=>m.weeklyScores.length>5).sort((a,b)=>a.sd-b.sd)[0];

  // --- Drama queen: highest standard deviation (most unpredictable) ---
  const dramaQueen = managers.map(m=>{
    const sc=m.weeklyScores.map(s=>s.score).filter(s=>s>0);
    const mean=sc.reduce((a,b)=>a+b,0)/(sc.length||1);
    const sd=Math.sqrt(sc.reduce((a,b)=>a+(b-mean)**2,0)/(sc.length||1));
    return {...m,sd,mean};
  }).filter(m=>m.weeklyScores.length>5).sort((a,b)=>b.sd-a.sd)[0];

  // --- League punching bag: most losses overall ---
  const punchingBag = [...managers].sort((a,b)=>b.losses-a.losses)[0];

  // --- Moral victory king: best avg score in losses ---
  const moralKing = managers.map(m=>{
    const losGames = nonZero.filter(mu=>(mu.oA===m.ownerId&&mu.sA<mu.sB)||(mu.oB===m.ownerId&&mu.sB<mu.sA));
    const avg = losGames.length ? losGames.reduce((s,mu)=>s+(mu.oA===m.ownerId?mu.sA:mu.sB),0)/losGames.length : 0;
    return {...m,lossAvg:avg,lossCount:losGames.length};
  }).filter(m=>m.lossCount>3).sort((a,b)=>b.lossAvg-a.lossAvg)[0];

  // --- Curbstomp king: highest avg margin of victory ---
  const curbstomp = managers.map(m=>{
    const wins = nonZero.filter(mu=>(mu.oA===m.ownerId&&mu.sA>mu.sB)||(mu.oB===m.ownerId&&mu.sB>mu.sA));
    const avgMargin = wins.length ? wins.reduce((s,mu)=>s+mu.diff,0)/wins.length : 0;
    return {...m,avgMargin,winCount:wins.length};
  }).filter(m=>m.winCount>3).sort((a,b)=>b.avgMargin-a.avgMargin)[0];

  // --- Almost had it: best record that didn't win championship ---
  const almostHadIt = managers.filter(m=>m.championships===0&&m.wins+m.losses>0)
    .sort((a,b)=>(b.wins/(b.wins+b.losses||1))-(a.wins/(a.wins+a.losses||1)))[0];

  // --- Longevity: most total points ever scored ---
  const pointsMachine = [...managers].sort((a,b)=>b.pf-a.pf)[0];

  // --- Dead weight: best record when scoring below their own average ---
  const clutchSurvivor = managers.map(m=>{
    const sc=m.weeklyScores.map(s=>s.score).filter(s=>s>0);
    const mean=sc.reduce((a,b)=>a+b,0)/(sc.length||1);
    const belowAvgWins = nonZero.filter(mu=>{
      if(mu.oA===m.ownerId&&mu.sA<mean&&mu.sA>mu.sB) return true;
      if(mu.oB===m.ownerId&&mu.sB<mean&&mu.sB>mu.sA) return true;
      return false;
    }).length;
    const belowAvgGames = nonZero.filter(mu=>(mu.oA===m.ownerId&&mu.sA<mean)||(mu.oB===m.ownerId&&mu.sB<mean)).length;
    return {...m,belowAvgWins,belowAvgGames,clutchRate:belowAvgWins/(belowAvgGames||1)};
  }).filter(m=>m.belowAvgGames>4).sort((a,b)=>b.clutchRate-a.clutchRate)[0];

  // --- Rivalry name lookup ---
  const rA = dashData.userMap[topRival?.oA]||'?', rB = dashData.userMap[topRival?.oB]||'?';
  const rWinnerName = topRival && topRival.wA > topRival.wB ? rA : rB;
  const rLoserName  = topRival && topRival.wA > topRival.wB ? rB : rA;
  const rWins = topRival ? Math.max(topRival.wA,topRival.wB) : 0;
  const rLoss = topRival ? Math.min(topRival.wA,topRival.wB) : 0;

  function funCard(emoji, title, winner, stat, flavor) {
    if (!winner) return '';
    const [bg,fg] = colorFor(winner.ownerId);
    return `<div class="fun-card">
      <div class="fun-emoji">${emoji}</div>
      <div class="fun-title">${title}</div>
      <div class="fun-winner">
        <div class="av" style="width:32px;height:32px;background:${bg};color:${fg};font-size:12px;font-weight:500;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0">${initials(winner.name)}</div>
        <span>${winner.name}</span>
      </div>
      <div class="fun-stat">${stat}</div>
      <div class="fun-flavor">${flavor}</div>
    </div>`;
  }

  function rivalCard() {
    if (!topRival) return '';
    const [bgA,fgA]=colorFor(topRival.oA), [bgB,fgB]=colorFor(topRival.oB);
    return `<div class="fun-card fun-card-wide">
      <div class="fun-emoji">⚔️</div>
      <div class="fun-title">Greatest rivalry</div>
      <div style="display:flex;align-items:center;gap:10px;margin:10px 0">
        <div class="av" style="width:32px;height:32px;background:${bgA};color:${fgA};font-size:12px;font-weight:500;border-radius:50%;display:flex;align-items:center;justify-content:center">${initials(rA)}</div>
        <span style="font-size:13px;font-weight:500">${rA}</span>
        <span style="font-size:12px;color:var(--text3)">vs</span>
        <div class="av" style="width:32px;height:32px;background:${bgB};color:${fgB};font-size:12px;font-weight:500;border-radius:50%;display:flex;align-items:center;justify-content:center">${initials(rB)}</div>
        <span style="font-size:13px;font-weight:500">${rB}</span>
      </div>
      <div class="fun-stat">${topRival.count} matchups all-time</div>
      <div class="fun-flavor">${rWinnerName} leads the series ${rWins}&ndash;${rLoss}</div>
    </div>`;
  }

  // Total points ever scored in the league
  const totalLeaguePts = allMatchups.reduce((s,m)=>s+m.sA+m.sB,0);

  return `
    <div class="section-label">Fun stats &amp; awards</div>
    <div class="fun-grid">
      ${funCard('💔','Heartbreak award',heartbreakKing,`${heartbreakKing?.hb||0} gut-punch losses`,`Lost by less than 5 pts more than anyone. Ouch.`)}
      ${funCard('🍀','Lucky charm',luckyCharm,`${luckyCharm?.lw||0} squeaker wins`,`Won by less than 5 pts more than anyone. Skill or luck?`)}
      ${funCard('💣','Glass cannon',glassCannon,`${fmt(glassCannon?.ppg,1)} PPG, ${((glassCannon?.wr||0)*100).toFixed(0)}% win rate`,`Scores a ton but somehow still loses. A fantasy tragedy.`)}
      ${funCard('🥊','League bully',bullyStats,`${((bullyStats?.bwr||0)*100).toFixed(0)}% win rate vs bottom half`,`Feasts on the weak. An absolute menace to society.`)}
      ${funCard('😴','Mr. Consistent',boringAward,`${fmt(boringAward?.sd,1)} pts std deviation`,`Never surprises you. Like clockwork. Boringly reliable.`)}
      ${funCard('🎢','Drama queen',dramaQueen,`${fmt(dramaQueen?.sd,1)} pts std deviation`,`You never know what you're getting. A true rollercoaster.`)}
      ${funCard('🏳️','League punching bag',punchingBag,`${punchingBag?.losses||0} all-time losses`,`Someone has to lose. ${punchingBag?.name.split(' ')[0]} volunteered.`)}
      ${funCard('😤','Moral victory king',moralKing,`${fmt(moralKing?.lossAvg,1)} avg pts in losses`,`Scores huge and still loses. The league's biggest "but I had the points" guy.`)}
      ${funCard('🔨','Curbstomp king',curbstomp,`+${fmt(curbstomp?.avgMargin,1)} avg margin of victory`,`When they win, they really win. No mercy.`)}
      ${funCard('🤡','Nearly man',almostHadIt,`${((almostHadIt?.wins/(almostHadIt?.wins+almostHadIt?.losses||1)||0)*100).toFixed(1)}% win rate, 0 rings`,`Best record with zero championships. Fantasy is cruel.`)}
      ${funCard('🐢','Survivor',clutchSurvivor,`${((clutchSurvivor?.clutchRate||0)*100).toFixed(0)}% W rate when below avg`,`Finds a way even on off weeks. The ultimate scrapper.`)}
      ${funCard('🏭','Points machine',pointsMachine,`${fmtInt(pointsMachine?.pf||0)} total points`,`Has put up more points than anyone in league history.`)}
      ${rivalCard()}
    </div>
    <div class="section-label">League fun facts</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden">
      <div class="metric"><div class="metric-label">Total pts ever scored</div><div class="metric-value">${fmtInt(totalLeaguePts)}</div><div class="metric-sub">across all seasons</div></div>
      <div class="metric"><div class="metric-label">Avg winning score</div><div class="metric-value">${fmt(nonZero.reduce((s,m)=>s+Math.max(m.sA,m.sB),0)/(nonZero.length||1),1)}</div><div class="metric-sub">all-time</div></div>
      <div class="metric"><div class="metric-label">Avg losing score</div><div class="metric-value">${fmt(nonZero.reduce((s,m)=>s+Math.min(m.sA,m.sB),0)/(nonZero.length||1),1)}</div><div class="metric-sub">all-time</div></div>
      <div class="metric"><div class="metric-label">Avg margin of victory</div><div class="metric-value">${fmt(nonZero.reduce((s,m)=>s+m.diff,0)/(nonZero.length||1),1)}</div><div class="metric-sub">pts per game</div></div>
      <div class="metric"><div class="metric-label">Games decided by &lt;5</div><div class="metric-value">${nonZero.filter(m=>m.diff<5).length}</div><div class="metric-sub">${((nonZero.filter(m=>m.diff<5).length/(nonZero.length||1))*100).toFixed(0)}% of all games</div></div>
      <div class="metric"><div class="metric-label">Blowouts (&gt;40 pts)</div><div class="metric-value">${nonZero.filter(m=>m.diff>40).length}</div><div class="metric-sub">${((nonZero.filter(m=>m.diff>40).length/(nonZero.length||1))*100).toFixed(0)}% of all games</div></div>
    </div>`;
}

function tabPlayers() {
  const {topScorers, topAvgScorers, mostTraded, mostCut} = dashData;

  const POS_COLORS = {
    QB: ['#3d1f6e','#c4b5fd'], RB: ['#0d3d2e','#6ee7b7'],
    WR: ['#0c2d4f','#93c5fd'], TE: ['#3d2a08','#fcd34d'],
    K:  ['#1e1e2e','#9ca3af'], DEF:['#3d1a0e','#fca5a5'],
    DST:['#3d1a0e','#fca5a5'],
  };
  function posChip(pos) {
    const [bg,fg] = POS_COLORS[pos] || ['#1e1e2e','#9ca3af'];
    return `<span class="pos-chip" style="background:${bg};color:${fg}">${pos||'?'}</span>`;
  }
  function playerRow(p, i, valFn, subFn) {
    return `<div class="lb-row">
      <span class="rank ${i===0?'gold':i===1?'silver':''}">${i+1}</span>
      ${posChip(p.pos)}
      <span class="lname" style="font-weight:${i<3?'500':'400'}">${p.name}</span>
      <span style="font-size:11px;color:var(--text3);min-width:28px;text-align:right">${p.team||''}</span>
      <div style="text-align:right;min-width:70px">
        <div class="val">${valFn(p)}</div>
        <div class="val-sub">${subFn(p)}</div>
      </div>
    </div>`;
  }
  function txnRow(p, i, label) {
    return `<div class="lb-row">
      <span class="rank ${i===0?'gold':i===1?'silver':''}">${i+1}</span>
      ${posChip(p.pos)}
      <span class="lname" style="font-weight:${i<3?'500':'400'}">${p.name}</span>
      <span style="font-size:11px;color:var(--text3);min-width:28px;text-align:right">${p.team||''}</span>
      <div style="text-align:right;min-width:80px">
        <div class="val">${p.count}</div>
        <div class="val-sub">${label}</div>
      </div>
    </div>`;
  }

  const bestSingle = [...topScorers].sort((a,b)=>b.bestWeek-a.bestWeek)[0];

  return `
    <div class="section-label">Player overview</div>
    <div class="metrics">
      <div class="metric"><div class="metric-label">Unique players</div><div class="metric-value">${topScorers.length.toLocaleString()}</div><div class="metric-sub">with 2+ scored weeks</div></div>
      <div class="metric"><div class="metric-label">Top scorer</div><div class="metric-value">${topScorers[0]?.name.split(' ').pop()||'—'}</div><div class="metric-sub">${Math.round(topScorers[0]?.totalPts||0)} pts total</div></div>
      <div class="metric"><div class="metric-label">Top avg/week</div><div class="metric-value">${topAvgScorers[0]?.name.split(' ').pop()||'—'}</div><div class="metric-sub">${(topAvgScorers[0]?.avgPts||0).toFixed(1)} PPG</div></div>
      <div class="metric"><div class="metric-label">Best single week</div><div class="metric-value">${(bestSingle?.bestWeek||0).toFixed(1)}</div><div class="metric-sub">${bestSingle?.name.split(' ').pop()||'—'}</div></div>
      ${mostTraded[0] ? `<div class="metric"><div class="metric-label">Most traded</div><div class="metric-value">${mostTraded[0].name.split(' ').pop()}</div><div class="metric-sub">${mostTraded[0].count}× traded</div></div>` : ''}
      ${mostCut[0] ? `<div class="metric"><div class="metric-label">Most cut</div><div class="metric-value">${mostCut[0].name.split(' ').pop()}</div><div class="metric-sub">${mostCut[0].count}× dropped</div></div>` : ''}
    </div>

    <div class="section-label">Top scorers — total points</div>
    <div class="card-solo">
      <p class="note">Total fantasy points scored while on any roster in this league, all seasons combined.</p>
      ${topScorers.slice(0,25).map((p,i)=>playerRow(p,i,
        p=>`${Math.round(p.totalPts)} pts`,
        p=>`${p.weeks} wks · ${p.seasons.length} season${p.seasons.length!==1?'s':''}`
      )).join('')}
    </div>

    <div class="section-label">Top scorers — average per week</div>
    <div class="card-solo">
      <p class="note">Minimum 4 scored weeks.</p>
      ${topAvgScorers.slice(0,25).map((p,i)=>playerRow(p,i,
        p=>`${p.avgPts.toFixed(1)} PPW`,
        p=>`${Math.round(p.totalPts)} total · ${p.weeks} wks`
      )).join('')}
    </div>

    <div class="section-label">Single best week</div>
    <div class="card-solo">
      ${[...topScorers].sort((a,b)=>b.bestWeek-a.bestWeek).slice(0,15).map((p,i)=>playerRow(p,i,
        p=>`${p.bestWeek.toFixed(1)} pts`,
        p=>p.bestWeekCtx
      )).join('')}
    </div>

    ${mostTraded.length ? `
    <div class="section-label">Most traded players</div>
    <div class="card-solo">
      <p class="note">Players who changed hands the most via trades across all seasons.</p>
      ${mostTraded.slice(0,15).map((p,i) => txnRow(p, i, `trade${p.count!==1?'s':''}`)).join('')}
    </div>` : ''}

    ${mostCut.length ? `
    <div class="section-label">Most cut players</div>
    <div class="card-solo">
      <p class="note">Players dropped via waiver or free agent release the most times.</p>
      ${mostCut.slice(0,15).map((p,i) => txnRow(p, i, `drop${p.count!==1?'s':''}`)).join('')}
    </div>` : ''}`;
}
function tabChampions() {
  const {champRosters, playerMap} = dashData;

  if (!champRosters.length) {
    return `<div class="section-label">Champions</div>
      <div class="card-solo"><p style="color:var(--text2);font-size:14px;padding:8px 0">No championship data found.</p></div>`;
  }

  const POS_COLORS = {
    QB:['#3d1f6e','#c4b5fd'], RB:['#0d3d2e','#6ee7b7'],
    WR:['#0c2d4f','#93c5fd'], TE:['#3d2a08','#fcd34d'],
    K:['#1e1e2e','#9ca3af'],  DEF:['#3d1a0e','#fca5a5'],
    DST:['#3d1a0e','#fca5a5'],
  };

  function posChip(pos) {
    const [bg,fg] = POS_COLORS[pos] || ['#1e1e2e','#9ca3af'];
    return `<span style="font-family:var(--font-mono);font-size:9px;font-weight:600;padding:2px 5px;border-radius:3px;background:${bg};color:${fg};min-width:32px;text-align:center;display:inline-block;letter-spacing:0.04em;flex-shrink:0">${pos||'?'}</span>`;
  }

  const sorted = [...champRosters].sort((a,b) => b.season - a.season);

  return `
    <div class="section-label">Championship rosters by year</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:2px;background:var(--border);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden" class="champs-grid">
      ${sorted.map(c => {
        const avatarUrl = c.ownerAvatar
          ? `https://sleepercdn.com/avatars/thumbs/${c.ownerAvatar}`
          : null;

        // Find top scoring starter for the headshot
        const pts = c.starterPts || {};
        const topPid = c.starters.length
          ? c.starters.reduce((best, pid) => (pts[pid]||0) > (pts[best]||0) ? pid : best, c.starters[0])
          : null;
        const topPlayer = topPid ? (playerMap[topPid] || {}) : {};
        const topPts = topPid ? (pts[topPid] || 0) : 0;
        const headshot = topPid
          ? `https://sleepercdn.com/content/nfl/players/thumb/${topPid}.jpg`
          : null;

        return `<div style="background:var(--dark2);padding:1.25rem 1.5rem">

          <!-- Owner header -->
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)">
            ${avatarUrl
              ? `<img src="${avatarUrl}" style="width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);flex-shrink:0" onerror="this.style.display='none'" />`
              : `<div style="width:44px;height:44px;border-radius:50%;background:var(--gold-dim);border:2px solid rgba(240,180,41,0.3);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:18px;font-weight:800;color:var(--gold);flex-shrink:0">${c.ownerName[0]?.toUpperCase()}</div>`
            }
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
                <span style="font-family:var(--font-display);font-size:20px;font-weight:800;color:var(--text);text-transform:uppercase;letter-spacing:0.02em">${c.ownerName}</span>
                <span style="font-family:var(--font-mono);font-size:9px;color:var(--gold);letter-spacing:0.1em;text-transform:uppercase;background:var(--gold-dim);padding:2px 6px;border-radius:3px;border:1px solid rgba(240,180,41,0.25)">CHAMP</span>
              </div>
              <span style="font-family:var(--font-display);font-size:16px;font-weight:700;font-style:italic;color:var(--gold)">${c.season}</span>
            </div>
          </div>

          <!-- Top scorer spotlight -->
          ${headshot && topPlayer.name ? `
          <div style="display:flex;align-items:center;gap:12px;background:var(--dark3);border-radius:var(--radius-lg);padding:10px 12px;margin-bottom:14px;border:1px solid rgba(240,180,41,0.15)">
            <img src="${headshot}"
              style="width:64px;height:64px;border-radius:var(--radius);object-fit:cover;object-position:top;flex-shrink:0;background:var(--dark4)"
              onerror="this.src='';this.style.display='none'" />
            <div>
              <div style="font-family:var(--font-mono);font-size:9px;color:var(--gold);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:4px">Season top scorer</div>
              <div style="font-family:var(--font-display);font-size:18px;font-weight:800;color:var(--text);text-transform:uppercase;letter-spacing:0.02em;line-height:1">${topPlayer.name}</div>
              <div style="font-family:var(--font-mono);font-size:11px;color:var(--text3);margin-top:4px">${topPts.toFixed(1)} pts &nbsp;·&nbsp; ${topPlayer.pos||''} &nbsp;·&nbsp; ${topPlayer.team||''}</div>
            </div>
          </div>` : ''}

          <!-- Starters list -->
          ${c.starters.length ? `
          <div style="font-family:var(--font-mono);font-size:9px;color:var(--text3);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:8px">Starters</div>
          ${c.starters.map(pid => {
            const p = playerMap[pid] || {};
            const team = c.seasonTeamMap?.[pid] || p.team || '';
            const isTop = pid === topPid;
            return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">
              ${posChip(p.pos||'')}
              <span style="font-size:13px;color:${isTop?'var(--gold)':'var(--text)'};flex:1;font-weight:${isTop?'600':'400'}">${p.name || pid}</span>
              <span style="font-family:var(--font-mono);font-size:10px;color:var(--text3)">${team}</span>
              ${pts[pid] ? `<span style="font-family:var(--font-display);font-size:15px;font-weight:700;color:${isTop?'var(--gold)':'var(--text3)'};min-width:42px;text-align:right">${pts[pid].toFixed(1)}</span>` : ''}
            </div>`;
          }).join('')}` : ''}
        </div>`;
      }).join('')}
    </div>`;
}

// Normalize name for fuzzy matching
function normName(n) {
  return n.toLowerCase()
    .replace(/\bjr\.?\b|\bsr\.?\b|\bii\b|\biii\b/g, '')
    .replace(/[^a-z ]/g, '')
    .replace(/\s+/g,' ')
    .trim();
}

// Build a name->contract lookup
const CONTRACT_MAP = {};
for (const c of CONTRACT_LIST) {
  CONTRACT_MAP[normName(c.n)] = c;
}

let salaryData = null; // reset each page load to re-run name matching

async function loadSalaryData() {
  if (salaryData) return salaryData;
  const API = 'https://api.sleeper.app/v1';
  const LEAGUE_ID = '1313934632156147712';

  // Fetch current season league ID (most recent)
  const {userMap, managers} = dashData;

  // Fetch current rosters + users only (player DB reused from dashData)
  const [rosters, users] = await Promise.all([
    fetch(`${API}/league/${LEAGUE_ID}/rosters`).then(r=>r.json()),
    fetch(`${API}/league/${LEAGUE_ID}/users`).then(r=>r.json()),
  ]);

  // Reuse already-loaded playerMap from dashData — no need to re-fetch the full DB
  const players = dashData.playerMap || {};

  // Build roster_id -> owner display name
  const rosterOwner = {};
  const userById = {};
  for (const u of users) userById[u.user_id] = u.display_name || u.username || u.user_id;
  for (const r of rosters) {
    if (r.owner_id) rosterOwner[r.roster_id] = userById[r.owner_id] || r.owner_id;
  }

  // Build player_id -> owner name
  const playerOwner = {};
  for (const r of rosters) {
    const owner = rosterOwner[r.roster_id];
    if (!owner) continue;
    for (const pid of (r.players || [])) playerOwner[pid] = owner;
  }

  // Match contracts to player IDs via name
  const matched = [];
  const unmatched = [];

  for (const c of CONTRACT_LIST) {
    const norm = normName(c.n);
    let matchedPid = null;

    // Exact name match
    for (const [pid, pl] of Object.entries(players)) {
      if (normName(pl.name||'') === norm) {
        // If we have a position hint, prefer the match with the right position
        if (c.hint && pl.pos && pl.pos !== c.hint) continue;
        matchedPid = pid; break;
      }
    }
    // Exact match ignoring hint (fallback if hint filtered everything)
    if (!matchedPid) {
      for (const [pid, pl] of Object.entries(players)) {
        if (normName(pl.name||'') === norm) { matchedPid = pid; break; }
      }
    }
    // Fuzzy: first+last word match, with optional position hint
    if (!matchedPid) {
      const parts = norm.split(' ').filter(w => !['jr','sr','ii','iii','iv'].includes(w));
      const first = parts[0], last = parts[parts.length-1];
      const candidates = [];
      for (const [pid, pl] of Object.entries(players)) {
        const pn = normName(pl.name||'');
        const pparts = pn.split(' ').filter(w => !['jr','sr','ii','iii','iv'].includes(w));
        if (pparts[0] === first && pparts[pparts.length-1] === last) candidates.push({pid, pl});
      }
      if (candidates.length === 1) {
        matchedPid = candidates[0].pid;
      } else if (candidates.length > 1 && c.hint) {
        // Use position hint to disambiguate
        const hinted = candidates.find(x => x.pl.pos === c.hint);
        matchedPid = hinted ? hinted.pid : candidates[0].pid;
      } else if (candidates.length > 1) {
        matchedPid = candidates[0].pid;
      }
    }
    const owner = matchedPid ? (playerOwner[matchedPid] || 'Free Agent') : 'Unknown';
    const pos = matchedPid ? (players[matchedPid]?.pos || '') : '';
    matched.push({...c, pid: matchedPid, owner, pos});
  }

  // Group by owner
  const byOwner = {};
  for (const c of matched) {
    if (!byOwner[c.owner]) byOwner[c.owner] = [];
    byOwner[c.owner].push(c);
  }
  for (const owner of Object.keys(byOwner)) {
    byOwner[owner].sort((a,b) => b.s - a.s);
  }

  salaryData = {matched, byOwner, playerOwner, players};
  return salaryData;
}

function contractBadge(c) {
  const yr = `${c.y}/${c.t}`;
  const last = c.y === c.t;
  const color = last ? 'var(--red-text)' : 'var(--text3)';
  const bg = last ? 'rgba(239,68,68,0.1)' : 'var(--dark4)';
  const ro = c.ro ? `<span style="font-family:var(--font-mono);font-size:9px;background:rgba(240,180,41,0.12);color:var(--gold);border:1px solid rgba(240,180,41,0.25);border-radius:3px;padding:1px 5px;margin-left:4px;letter-spacing:0.04em">RO</span>` : '';
  return `<span style="font-family:var(--font-mono);font-size:9px;background:${bg};color:${color};border-radius:3px;padding:2px 5px;letter-spacing:0.04em">${yr}</span>${ro}`;
}

const POS_COLORS = {QB:['#3d1f6e','#c4b5fd'],RB:['#0d3d2e','#6ee7b7'],WR:['#0c2d4f','#93c5fd'],TE:['#3d2a08','#fcd34d'],K:['#1e1e2e','#9ca3af'],DEF:['#3d1a0e','#fca5a5'],DST:['#3d1a0e','#fca5a5']};
function posChipS(pos) {
  const [bg,fg] = POS_COLORS[pos]||['#1e1e2e','#9ca3af'];
  return `<span style="font-family:var(--font-mono);font-size:9px;font-weight:600;padding:2px 5px;border-radius:3px;background:${bg};color:${fg};min-width:28px;text-align:center;display:inline-block;flex-shrink:0">${pos||'?'}</span>`;
}

function playerRow(c, showOwner=false) {
  return `<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)">
    ${posChipS(c.pos)}
