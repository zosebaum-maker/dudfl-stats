  </div>`;
}

function renderSalaryContent(data) {
  const el = document.getElementById('salary-content');
  if (!el) return;
  const {matched, byOwner} = data;

  if (salaryView === 'byOwner') {
    const CAP = 100;
    const owners = Object.entries(byOwner)
      .filter(([o]) => o !== 'Free Agent' && o !== 'Unknown')
      .sort((a,b) => b[1].reduce((s,c)=>s+c.s,0) - a[1].reduce((s,c)=>s+c.s,0));

    el.innerHTML = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:2px;background:var(--border);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden">
      ${owners.map(([owner, contracts]) => {
        const total = contracts.reduce((s,c)=>s+c.s,0);
        const remaining = CAP - total;
        const usedPct = Math.min((total / CAP) * 100, 100).toFixed(0);
        const expiring = contracts.filter(c=>c.y===c.t).length;
        const [bg,fg] = colorFor(owner);
        const capColor = remaining < 0 ? 'var(--red-text)' : remaining < 10 ? 'var(--amber-text)' : 'var(--green-text)';
        return `<div style="background:var(--dark2);padding:1.125rem 1.25rem">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border)">
            <div style="width:32px;height:32px;border-radius:50%;background:${bg};color:${fg};display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:13px;font-weight:700;flex-shrink:0">${initials(owner)}</div>
            <div style="flex:1;min-width:0">
              <div style="font-family:var(--font-display);font-size:16px;font-weight:800;text-transform:uppercase;color:var(--text);letter-spacing:0.02em">${owner}</div>
              <div style="font-family:var(--font-mono);font-size:10px;color:var(--text3)">${contracts.length} players · ${expiring} expiring</div>
            </div>
            <div style="text-align:right;flex-shrink:0">
              <div style="font-family:var(--font-display);font-size:22px;font-weight:800;color:var(--gold);line-height:1">$${total}<span style="font-size:13px;color:var(--text3);font-weight:400"> / $${CAP}</span></div>
              <div style="font-family:var(--font-mono);font-size:10px;color:${capColor};margin-top:2px">${remaining >= 0 ? '$'+remaining+' remaining' : '$'+Math.abs(remaining)+' OVER CAP'}</div>
            </div>
          </div>
          <div style="height:3px;background:var(--dark4);border-radius:2px;margin-bottom:12px;overflow:hidden">
            <div style="height:3px;border-radius:2px;width:${usedPct}%;background:${remaining<0?'var(--red)':remaining<10?'var(--gold)':'var(--green)'};transition:width 0.3s ease"></div>
          </div>
          ${contracts.map(c=>playerRow(c)).join('')}
        </div>`;
      }).join('')}
    </div>`;


  } else if (salaryView === 'byPosition') {
    const POS_ORDER = ['QB','RB','WR','TE','K','DEF','DST'];
    const FANTASY_POS = new Set(POS_ORDER);
    const byPos = {};
    // Only include rostered players (not free agents/unknown) and only fantasy-relevant positions
    for (const c of matched) {
      if (c.owner === 'Free Agent' || c.owner === 'Unknown') continue;
      const p = c.pos || 'Unknown';
      if (!FANTASY_POS.has(p)) continue;
      if (!byPos[p]) byPos[p] = [];
      byPos[p].push(c);
    }
    const posEntries = Object.entries(byPos)
      .sort((a,b) => {
        const ai = POS_ORDER.indexOf(a[0]), bi = POS_ORDER.indexOf(b[0]);
        if (ai !== -1 && bi !== -1) return ai - bi;
        if (ai !== -1) return -1;
        if (bi !== -1) return 1;
        return 0;
      });

    const defaultPos = posEntries[0]?.[0] || 'QB';
    window._posData = Object.fromEntries(posEntries);
    window.setPosFilter = function(pos) {
      const contracts = window._posData[pos] || [];
      const sorted = [...contracts].sort((a,b)=>b.s-a.s);
      const [bg,fg] = POS_COLORS[pos]||['#1e1e2e','#9ca3af'];
      document.getElementById('pos-list').innerHTML =
        '<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;padding-bottom:12px;border-bottom:2px solid '+bg+'">' +
        '<span style="font-family:var(--font-display);font-size:28px;font-weight:900;font-style:italic;padding:4px 14px;border-radius:6px;background:'+bg+';color:'+fg+';letter-spacing:0.06em;text-transform:uppercase;line-height:1.1">'+pos+'</span>' +
        '<div style="font-family:var(--font-mono);font-size:11px;color:var(--text3);letter-spacing:0.06em">'+sorted.length+' player'+(sorted.length!==1?'s':'')+'</div>' +
        '</div>' +
        sorted.map(c=>playerRow(c,true)).join('');
      posEntries.forEach(([p]) => {
        const btn = document.getElementById('posbtn-'+p);
        if (!btn) return;
        const [pbg,pfg] = POS_COLORS[p]||['#1e1e2e','#9ca3af'];
        btn.style.background = p===pos ? pbg : 'var(--dark3)';
        btn.style.color = p===pos ? pfg : 'var(--text3)';
        btn.style.borderColor = p===pos ? pbg : 'var(--border2)';
      });
    };
    el.innerHTML =
      '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">' +
      posEntries.map(([pos]) => {
        return '<button id="posbtn-'+pos+'" onclick="setPosFilter(\'' + pos + '\')" style="font-family:var(--font-display);font-size:15px;font-weight:800;font-style:italic;padding:4px 14px;border-radius:5px;border:1px solid var(--border2);background:var(--dark3);color:var(--text3);cursor:pointer;letter-spacing:0.06em;transition:all 0.15s">'+pos+'</button>';
      }).join('') +
      '</div>' +
      '<div class="card-solo" id="pos-list"></div>';
    window.setPosFilter(defaultPos);

  } else if (salaryView === 'allPlayers') {
    const sorted = matched.filter(c=>c.owner!=='Free Agent'&&c.owner!=='Unknown').sort((a,b)=>b.s-a.s);
    el.innerHTML = `<div class="card-solo">
      <p class="note">${sorted.length} contracts · sorted by salary</p>
      ${sorted.map(c=>playerRow(c,true)).join('')}
    </div>`;

  } else if (salaryView === 'expiring') {
    const exp = matched.filter(c=>c.y===c.t&&c.owner!=='Free Agent'&&c.owner!=='Unknown').sort((a,b)=>b.s-a.s);
    el.innerHTML = `<div class="card-solo">
      <p class="note">${exp.length} contracts expiring after this season</p>
      ${exp.map(c=>playerRow(c,true)).join('')}
    </div>`;

  } else if (salaryView === 'rookieOptions') {
    const ro = matched.filter(c=>c.ro&&c.owner!=='Free Agent'&&c.owner!=='Unknown').sort((a,b)=>b.s-a.s);
    el.innerHTML = `<div class="card-solo">
      <p class="note">${ro.length} rookie option contracts</p>
      ${ro.map(c=>playerRow(c,true)).join('')}
    </div>`;

  } else if (salaryView === 'bianchi') {
    renderBianchiLaw({matched, byOwner});
  } else if (salaryView === 'moneyTeams') {
    const {playerPoints2024, lastSeason, playerMap} = dashData;
    // Build scoring map from last season only
    const scoringMap = {};
    for (const [pid, s] of Object.entries(playerPoints2024)) {
      if (s.weeks >= 4) {
        scoringMap[pid] = {
          pid,
          avgPts: s.totalPts / s.weeks,
          totalPts: s.totalPts,
          weeks: s.weeks,
          name: playerMap[pid]?.name || pid,
          pos: playerMap[pid]?.pos || '',
        };
      }
    }
    renderMoneyTeams({matched, byOwner}, scoringMap, lastSeason);
  }
}

function renderBianchiLaw(salData) {
  const el = document.getElementById('salary-content');
  if (!el) return;
  const {matched, byOwner} = salData;
  const {playerPoints2024, lastSeason, playerMap} = dashData;

  // Build scoring map from last season
  const scoringMap = {};
  for (const [pid, s] of Object.entries(playerPoints2024 || {})) {
    if (s.weeks >= 2) {
      scoringMap[pid] = {
        avgPts: s.totalPts / s.weeks,
        totalPts: s.totalPts,
        weeks: s.weeks,
      };
    }
  }

  // ── POSITION RANKINGS ──
  // Rank ALL players in playerPoints2024 by position using total points,
  // so we can show WR4, QB2, etc. for each contracted player.
  const posRankMap = {}; // pid -> { rank, pos, label e.g. "WR4" }
  const posBuckets = {};
  for (const [pid, s] of Object.entries(playerPoints2024 || {})) {
    const pos = playerMap[pid]?.pos || '';
    if (!['QB','RB','WR','TE','K'].includes(pos)) continue;
    if (s.weeks < 2) continue;
    if (!posBuckets[pos]) posBuckets[pos] = [];
    posBuckets[pos].push({ pid, totalPts: s.totalPts });
  }
  for (const [pos, arr] of Object.entries(posBuckets)) {
    arr.sort((a, b) => b.totalPts - a.totalPts);
    arr.forEach((p, i) => {
      posRankMap[p.pid] = { rank: i + 1, label: `${pos}${i + 1}` };
    });
  }

  // ── LEAGUE-DERIVED MARKET RATE ──
  // Fair value is calculated from this league's own data:
  // market rate = total PPW across all rostered players / total salary spent
  // This means "bust" and "bargain" are relative to what THIS league pays for points.
  const rosteredWithData = matched
    .filter(c => c.owner !== 'Free Agent' && c.owner !== 'Unknown' && c.pid && scoringMap[c.pid]);

  // ── PER-POSITION MARKET RATES ──
  // QBs score 3-4x more PPW than WRs/RBs, so a blended rate makes every QB look like a steal.
  // Instead, calculate market rate separately per position:
  // what does $1 buy you in PPW at THIS position in THIS league?
  const posSalaryTotals = {};
  const posPPWTotals = {};
  for (const c of rosteredWithData) {
    const pos = c.pos || 'Unknown';
    posSalaryTotals[pos] = (posSalaryTotals[pos] || 0) + c.s;
    posPPWTotals[pos]    = (posPPWTotals[pos]    || 0) + scoringMap[c.pid].avgPts;
  }
  const posMarketRate = {}; // pos -> PPW per $1 at that position
  const fallbackRate  = rosteredWithData.length
    ? rosteredWithData.reduce((s,c)=>s+scoringMap[c.pid].avgPts,0) / rosteredWithData.reduce((s,c)=>s+c.s,0)
    : 5;
  for (const pos of Object.keys(posSalaryTotals)) {
    posMarketRate[pos] = posSalaryTotals[pos] > 0
      ? posPPWTotals[pos] / posSalaryTotals[pos]
      : fallbackRate;
  }
  // Keep a single league-wide rate for display in the header
  const MARKET_RATE = fallbackRate;

  // Enrich each rostered contract with scoring + value judgment
  const enriched = matched
    .filter(c => c.owner !== 'Free Agent' && c.owner !== 'Unknown' && c.pid)
    .map(c => {
      const score = scoringMap[c.pid];
      if (!score) return { ...c, hasData: false };
      const ppw = score.avgPts;
      const posRate = posMarketRate[c.pos] || fallbackRate; // use this position's market rate
      const fairValue = Math.max(1, Math.round(ppw / posRate));
      const delta = fairValue - c.s;
      const rawRatio = ppw / (c.s * posRate); // 1.0 = exactly market rate FOR THIS POSITION
      const posRank = posRankMap[c.pid] || null;

      // ── RANK-ADJUSTED RATIO ──
      // A top-10 finisher at their position should get credit for that.
      // We soften the bust/bargain threshold based on positional rank:
      // - Top 3 at position: tolerance band widens to ±40% before calling bust/bargain
      // - Top 10: widens to ±25%
      // - Top 20: widens to ±15% (default)
      // This means Chase finishing WR2 at $28 won't be labeled a bust —
      // he delivered elite production, just expensive.
      const rank = posRank ? posRank.rank : 999;
      const tolerance = rank <= 3 ? 0.40 : rank <= 10 ? 0.25 : 0.15;
      // Normalize ratio against tolerance so 1.0 still = exactly market
      // but the bust/bargain thresholds shift with rank
      const ratio = rawRatio;
      const bustThreshold    = 1 - tolerance;   // e.g. 0.60 for top-3
      const bargainThreshold = 1 + tolerance;   // e.g. 1.40 for top-3

      return { ...c, ppw, weeks: score.weeks, totalPts: score.totalPts, fairValue, delta, ratio, rawRatio, posRank, bustThreshold, bargainThreshold, hasData: true };
    });

  const withData = enriched.filter(c => c.hasData);
  const noData   = enriched.filter(c => !c.hasData);

  const byDelta  = [...withData].sort((a, b) => b.delta - a.delta);
  const bargains = byDelta.filter(c => c.ratio >= c.bargainThreshold);
  const busts    = [...withData].filter(c => c.ratio < c.bustThreshold).sort((a,b) => a.ratio - b.ratio);
  // Market value = within each player's rank-adjusted tolerance band
  const marketVal = [...withData].filter(c => c.ratio >= c.bustThreshold && c.ratio < c.bargainThreshold)
    .sort((a,b) => b.ppw - a.ppw);

  function valueBar(c) {
    const {ratio, bustThreshold, bargainThreshold} = c;
    const pct = Math.min(Math.max(ratio * 50, 2), 100).toFixed(0);
    const color = ratio >= bargainThreshold * 1.5 ? 'var(--green)'
                : ratio >= bargainThreshold        ? 'var(--gold)'
                : ratio >= bustThreshold           ? '#a78bfa'
                : ratio >= bustThreshold * 0.6     ? 'var(--amber-text)'
                : 'var(--red)';
    return `<div style="flex:1;height:4px;background:var(--dark4);border-radius:2px;overflow:hidden;min-width:40px">
      <div style="height:4px;border-radius:2px;width:${pct}%;background:${color}"></div>
    </div>`;
  }

  function valueLabel(c) {
    const {ratio, bustThreshold, bargainThreshold} = c;
    if (ratio >= bargainThreshold * 1.5) return `<span style="font-family:var(--font-mono);font-size:9px;background:rgba(34,197,94,0.15);color:var(--green-text);border-radius:3px;padding:1px 5px">STEAL</span>`;
    if (ratio >= bargainThreshold)       return `<span style="font-family:var(--font-mono);font-size:9px;background:rgba(34,197,94,0.1);color:var(--green-text);border-radius:3px;padding:1px 5px">BARGAIN</span>`;
    if (ratio >= bustThreshold)          return `<span style="font-family:var(--font-mono);font-size:9px;background:rgba(167,139,250,0.15);color:#c4b5fd;border-radius:3px;padding:1px 5px">MARKET</span>`;
    if (ratio >= bustThreshold * 0.6)    return `<span style="font-family:var(--font-mono);font-size:9px;background:rgba(245,158,11,0.12);color:var(--amber-text);border-radius:3px;padding:1px 5px">OVERPAID</span>`;
    return `<span style="font-family:var(--font-mono);font-size:9px;background:rgba(239,68,68,0.1);color:var(--red-text);border-radius:3px;padding:1px 5px">BUST</span>`;
  }

  function posRankBadge(posRank) {
    if (!posRank) return '';
    const rank = posRank.rank;
    // Color by tier: 1-3 gold, 4-8 green, 9-16 blue, 17-24 amber, 25+ red
    const color = rank <= 3 ? 'var(--gold)' : rank <= 8 ? 'var(--green-text)' : rank <= 16 ? 'var(--blue-text)' : rank <= 24 ? 'var(--amber-text)' : 'var(--text3)';
    const bg    = rank <= 3 ? 'var(--gold-dim)' : rank <= 8 ? 'var(--green-bg)' : rank <= 16 ? 'var(--blue-bg)' : rank <= 24 ? 'var(--amber-bg)' : 'var(--dark4)';
    return `<span style="font-family:var(--font-mono);font-size:9px;font-weight:700;background:${bg};color:${color};border-radius:3px;padding:1px 5px;white-space:nowrap">${posRank.label}</span>`;
  }

  function bianchiRow(c) {
    const deltaColor = c.delta > 0 ? 'var(--green-text)' : c.delta < 0 ? 'var(--red-text)' : '#c4b5fd';
    const deltaStr   = c.delta > 0 ? `+$${c.delta}` : c.delta < 0 ? `-$${Math.abs(c.delta)}` : 'even';
    return `<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">
      ${posChipS(c.pos)}
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:nowrap">
          <span style="font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0">${c.n}</span>
          ${c.posRank ? posRankBadge(c.posRank) : ''}
        </div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:3px">
          ${valueBar(c)}
          <span style="font-family:var(--font-mono);font-size:9px;color:var(--text3);white-space:nowrap">${c.ppw.toFixed(1)} PPW · ${c.weeks}gp</span>
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:3px">
        ${valueLabel(c)}
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-family:var(--font-mono);font-size:10px;color:var(--text3)">paid $${c.s} · worth ~$${c.fairValue}</span>
          <span style="font-family:var(--font-display);font-size:15px;font-weight:800;color:${deltaColor}">${deltaStr}</span>
        </div>
      </div>
    </div>`;
  }

  const totalOverpaid   = busts.reduce((s,c) => s + Math.abs(c.delta), 0);
  const totalUnderpaid  = bargains.reduce((s,c) => s + c.delta, 0);
  const avgRatio        = withData.length ? (withData.reduce((s,c)=>s+c.ratio,0)/withData.length).toFixed(2) : '—';

  el.innerHTML = `
    <div style="text-align:center;padding:1.5rem 0 1.25rem">
      <div style="font-family:var(--font-display);font-size:38px;font-weight:900;font-style:italic;color:#c4b5fd;text-transform:uppercase;line-height:1">Bianchi's Law</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--text3);letter-spacing:0.14em;text-transform:uppercase;margin-top:8px">
        Per-position market rates · each position judged against its own PPW-per-dollar baseline · ${lastSeason || 'last season'}
      </div>
    </div>

    <div class="metrics" style="margin-bottom:1.5rem">
      <div class="metric"><div class="metric-label">QB rate</div><div class="metric-value">${(posMarketRate['QB']||0).toFixed(1)}</div><div class="metric-sub">PPW per $1 at QB</div></div>
      <div class="metric"><div class="metric-label">RB rate</div><div class="metric-value">${(posMarketRate['RB']||0).toFixed(1)}</div><div class="metric-sub">PPW per $1 at RB</div></div>
      <div class="metric"><div class="metric-label">WR rate</div><div class="metric-value">${(posMarketRate['WR']||0).toFixed(1)}</div><div class="metric-sub">PPW per $1 at WR</div></div>
      <div class="metric"><div class="metric-label">TE rate</div><div class="metric-value">${(posMarketRate['TE']||0).toFixed(1)}</div><div class="metric-sub">PPW per $1 at TE</div></div>
      <div class="metric"><div class="metric-label">Bargains</div><div class="metric-value" style="color:var(--green-text)">${bargains.length}</div><div class="metric-sub">&gt;15% above market</div></div>
      <div class="metric"><div class="metric-label">Market value</div><div class="metric-value" style="color:#c4b5fd">${marketVal.length}</div><div class="metric-sub">within 15% of market</div></div>
      <div class="metric"><div class="metric-label">Busts</div><div class="metric-value" style="color:var(--red-text)">${busts.length}</div><div class="metric-sub">&gt;15% below market</div></div>
      <div class="metric"><div class="metric-label">Total overpaid</div><div class="metric-value" style="color:var(--red-text)">$${totalOverpaid}</div><div class="metric-sub">vs market rate</div></div>
      <div class="metric"><div class="metric-label">Total underpaid</div><div class="metric-value" style="color:var(--green-text)">$${totalUnderpaid}</div><div class="metric-sub">value surplus</div></div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:14px;margin-bottom:1.5rem">
      <div class="card-solo">
        <div style="font-family:var(--font-display);font-size:16px;font-weight:800;text-transform:uppercase;color:var(--green-text);letter-spacing:0.04em;margin-bottom:4px;padding-bottom:10px;border-bottom:1px solid var(--border)">💰 Biggest steals</div>
        <p class="note">Producing well above what their salary implies at league market rate</p>
        ${bargains.slice(0,15).map(c => bianchiRow(c)).join('')}
        ${bargains.length === 0 ? '<p style="color:var(--text3);font-size:13px;padding:8px 0">No bargains found.</p>' : ''}
      </div>
      <div class="card-solo">
        <div style="font-family:var(--font-display);font-size:16px;font-weight:800;text-transform:uppercase;color:var(--red-text);letter-spacing:0.04em;margin-bottom:4px;padding-bottom:10px;border-bottom:1px solid var(--border)">🔥 Biggest busts</div>
        <p class="note">Producing well below what their salary implies at league market rate</p>
        ${busts.slice(0,15).map(c => bianchiRow(c)).join('')}
        ${busts.length === 0 ? '<p style="color:var(--text3);font-size:13px;padding:8px 0">No busts found.</p>' : ''}
      </div>
    </div>

    <div class="section-label">⚖️ Getting paid market value</div>
    <div class="card-solo">
      <p class="note">${marketVal.length} players within their position's market rate tolerance · sorted by PPW</p>
      ${marketVal.map(c => bianchiRow(c)).join('')}
      ${marketVal.length === 0 ? '<p style="color:var(--text3);font-size:13px;padding:8px 0">No players at market value.</p>' : ''}
    </div>

    <div class="section-label">Full league value breakdown</div>
    <div class="card-solo">
      <p class="note">${withData.length} players · sorted by value surplus vs their position's market rate</p>
      ${byDelta.map(c => bianchiRow(c)).join('')}
    </div>

    ${noData.length ? `
    <div class="section-label">No scoring data this season</div>
    <div class="card-solo">
      <p class="note">${noData.length} contracted players with no scoring data (injured, inactive, or new)</p>
      ${noData.map(c => `<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)">
        ${posChipS(c.pos)}
        <span style="font-size:13px;color:var(--text2);flex:1">${c.n}</span>
        <span style="font-size:11px;color:var(--text3)">${c.owner}</span>
        <span style="font-family:var(--font-display);font-size:15px;font-weight:700;color:var(--text3)">$${c.s}</span>
      </div>`).join('')}
    </div>` : ''}`;
}

function renderMoneyTeams(salData, scoringMap, season) {
  const el = document.getElementById('salary-content');
  if (!el) return;
  const seasonLabel = season || 'Last Season';

  // Enrich matched contracts with scoring data
  // Only include players with meaningful scoring history (5+ weeks)
  // A full regular season is ~14 weeks. Use that as the baseline.
  const FULL_SEASON = 14;
  const MIN_WEEKS = 6; // must have played at least 6 games to qualify

  const valued = salData.matched
    .map(c => {
      const score = c.pid ? scoringMap[c.pid] : null;
      if (!score || score.weeks < MIN_WEEKS) return null;
      const ppw = score.avgPts;
      const availability = Math.min(score.weeks / FULL_SEASON, 1); // 0-1, 1 = played full season
      // Value = PPW per dollar, penalized by availability
      // A player who played 6/14 weeks gets a 43% availability penalty
      const ppd = (ppw * availability) / c.s;
      const totalPts = score.totalPts;
      return {...c, ppw, ppd, availability, totalPts, weeks: score.weeks};
    })
    .filter(Boolean);

  // Sort by value for each team — pick best starters lineup
  // Positions to fill: QB, RB, RB, WR, WR, WR, TE, FLEX(RB/WR/TE)
  function buildTeam(sortedPlayers, label) {
    const slots = {QB:1, RB:2, WR:3, TE:1, FLEX:1};
    const filled = {QB:0, RB:0, WR:0, TE:0, FLEX:0};
    const roster = [];
    const used = new Set();

    // First pass: fill primary slots
    for (const p of sortedPlayers) {
      if (used.has(p.pid)) continue;
      const pos = p.pos;
      if (['QB','RB','WR','TE'].includes(pos) && filled[pos] < slots[pos]) {
        roster.push({...p, slot: pos});
        filled[pos]++;
        used.add(p.pid);
      }
    }
    // Second pass: fill FLEX with best remaining RB/WR/TE
    for (const p of sortedPlayers) {
      if (used.has(p.pid)) continue;
      if (['RB','WR','TE'].includes(p.pos) && filled.FLEX < slots.FLEX) {
        roster.push({...p, slot: 'FLEX'});
        filled.FLEX++;
        used.add(p.pid);
      }
    }
    return roster;
  }

  // All-Bargain: highest PPD
  const byBargain = [...valued].sort((a,b) => b.ppd - a.ppd);
  const bargainTeam = buildTeam(byBargain, 'bargain');

  // All-Ripoff: lowest PPD (but only meaningful salary contracts, $3+)
  const byRipoff = [...valued].filter(c => c.s >= 3).sort((a,b) => a.ppd - b.ppd);
  const ripoffTeam = buildTeam(byRipoff, 'ripoff');

  const SLOT_ORDER = ['QB','RB','WR','TE','FLEX'];

  function teamCard(team, title, subtitle, accentColor, icon, bg) {
    const sorted = [...team].sort((a,b) => SLOT_ORDER.indexOf(a.slot) - SLOT_ORDER.indexOf(b.slot));
    const totalSalary = team.reduce((s,p)=>s+p.s,0);
    const avgPPW = team.reduce((s,p)=>s+p.ppw,0)/team.length;

    return `<div style="background:var(--dark2);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden">

      <!-- Header -->
      <div style="background:${bg};padding:1.5rem 1.5rem 1.25rem;border-bottom:1px solid var(--border)">
        <div style="font-size:28px;margin-bottom:8px">${icon}</div>
        <div style="font-family:var(--font-display);font-size:13px;font-weight:700;color:${accentColor};text-transform:uppercase;letter-spacing:0.14em;margin-bottom:4px">${subtitle}</div>
        <div style="font-family:var(--font-display);font-size:32px;font-weight:900;color:var(--text);text-transform:uppercase;letter-spacing:0.02em;line-height:1">${title}</div>
        <div style="display:flex;gap:20px;margin-top:12px">
          <div><div style="font-family:var(--font-mono);font-size:9px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase">Total salary</div>
            <div style="font-family:var(--font-display);font-size:20px;font-weight:800;color:${accentColor}">$${totalSalary}</div></div>
          <div><div style="font-family:var(--font-mono);font-size:9px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase">Avg PPW</div>
            <div style="font-family:var(--font-display);font-size:20px;font-weight:800;color:var(--text)">${avgPPW.toFixed(1)}</div></div>
        </div>
      </div>

      <!-- Roster -->
      <div style="padding:0.75rem 1.25rem">
        ${sorted.map((p,i) => {
          const [bg2,fg] = colorFor(p.owner);
          const valueTxt = p.s === 1
            ? `$1 steal`
            : `${p.ppd.toFixed(1)} pts/$`;
          return `<div style="display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--border)">
            <span style="font-family:var(--font-mono);font-size:9px;font-weight:600;color:var(--text3);min-width:34px;letter-spacing:0.04em">${p.slot}</span>
            ${posChipS(p.pos)}
            <div style="flex:1;min-width:0">
              <div style="font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.n}</div>
              <div style="font-family:var(--font-mono);font-size:10px;color:var(--text3);margin-top:1px">${p.owner} · $${p.s} · ${p.y}/${p.t}${p.ro?' RO':''} · <span style="color:${p.weeks>=12?'var(--green-text)':p.weeks>=8?'var(--text3)':'var(--red-text)'}">${p.weeks}gp</span></div>
            </div>
            <div style="text-align:right;flex-shrink:0">
              <div style="font-family:var(--font-display);font-size:17px;font-weight:800;color:${accentColor}">${p.ppw.toFixed(1)}</div>
              <div style="font-family:var(--font-mono);font-size:9px;color:var(--text3)">${p.weeks}/${FULL_SEASON} games</div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  // Also build top/bottom 15 value list
  const topBargains = byBargain.slice(0, 15);
  const topRipoffs = byRipoff.slice(0, 15);

  function valueListRow(p, i, isBargain) {
    const color = isBargain ? 'var(--green-text)' : 'var(--red-text)';
    const gpColor = p.weeks >= 12 ? 'var(--green-text)' : p.weeks >= 8 ? 'var(--text3)' : 'var(--red-text)';
    return `<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)">
      <span style="font-family:var(--font-mono);font-size:11px;color:var(--text3);min-width:20px;text-align:center">${i+1}</span>
      ${posChipS(p.pos)}
      <span style="font-size:13px;color:var(--text);flex:1;font-weight:${i<3?'600':'400'}">${p.n}</span>
      <span style="font-size:11px;color:var(--text3);margin-right:4px">${p.owner}</span>
      <span style="font-family:var(--font-mono);font-size:10px;color:var(--text3);margin-right:4px">$${p.s}</span>
      <span style="font-family:var(--font-mono);font-size:10px;color:${gpColor};margin-right:6px">${p.weeks}gp</span>
      <span style="font-family:var(--font-display);font-size:16px;font-weight:700;color:${color};min-width:52px;text-align:right">${p.ppw.toFixed(1)} PPW</span>
    </div>`;
  }

  el.innerHTML = `
    <div style="text-align:center;padding:1.5rem 0 1.25rem">
      <div style="font-family:var(--font-display);font-size:38px;font-weight:900;font-style:italic;color:var(--gold);text-transform:uppercase;line-height:1">Juice's All Money Teams</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--text3);letter-spacing:0.14em;text-transform:uppercase;margin-top:8px">Based on ${seasonLabel} fantasy points per dollar of salary</div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px;margin-bottom:2rem">
      ${teamCard(bargainTeam,
        'All-Bargain Team',
        "Juice's",
        'var(--green-text)',
        '💰',
        'rgba(34,197,94,0.06)'
      )}
      ${teamCard(ripoffTeam,
        'All-Rip-off Team',
        "Juice's",
        'var(--red-text)',
        '🔥',
        'rgba(239,68,68,0.06)'
      )}
    </div>

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px">
      <div class="card-solo">
        <div style="font-family:var(--font-display);font-size:16px;font-weight:800;text-transform:uppercase;color:var(--green-text);letter-spacing:0.04em;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border)">💰 Biggest bargains</div>
        <p class="note">${seasonLabel} · ranked by fantasy points per dollar</p>
        ${topBargains.map((p,i)=>valueListRow(p,i,true)).join('')}
      </div>
      <div class="card-solo">
        <div style="font-family:var(--font-display);font-size:16px;font-weight:800;text-transform:uppercase;color:var(--red-text);letter-spacing:0.04em;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border)">🔥 Biggest rip-offs</div>
        <p class="note">${seasonLabel} · min $3 salary · worst points-per-dollar</p>
        ${topRipoffs.map((p,i)=>valueListRow(p,i,false)).join('')}
      </div>
    </div>`;
}

loadAll('1313934632156147712').catch(e => {
  render(`<div style="padding:3rem 1rem;text-align:center">
    <div style="font-size:14px;color:var(--text2);margin-bottom:1rem">Could not load league data: ${e.message}</div>
    <button class="primary" onclick="loadAll('1313934632156147712').catch(()=>{})">Retry</button>

  </div>`);
});
</script>
</body>
</html>
